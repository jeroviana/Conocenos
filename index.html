<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-pink: #F4C7CC; 
            --text-purple: #4A235A; 
            --btn-pink: #B78A9C; 
            --btn-pink-light: #E6B0AA; 
            --card-crema: #FDF8F5; 
            --btn-red: #F26157; 
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            outline: none; 
            margin: 0; 
            padding: 0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-pink); 
            color: var(--text-purple); 
            overflow-x: hidden; 
            line-height: 1.5;
        }

        /* --- PANTALLA DE BIENVENIDA --- */
        #welcome-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--bg-pink); 
            z-index: 10000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            text-align: center; 
            transition: opacity 1.2s ease-in-out, visibility 1.2s; 
        }

        .welcome-text h2 { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1.8rem; 
            margin-bottom: 25px; 
            color: var(--text-purple); 
            opacity: 0;
            animation: fadeInPoetic 1.2s forwards 0.5s; 
        }

        .welcome-text p { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            margin-bottom: 20px; 
            color: var(--text-purple); 
            opacity: 0;
        }

        .p1 { animation: fadeInPoetic 1.2s forwards 1.2s; }
        .p2 { animation: fadeInPoetic 1.2s forwards 2.2s; }
        
        #conocenos-btn { 
            margin-top: 20px; 
            padding: 18px 50px; 
            border-radius: 50px; 
            border: none; 
            background: white; 
            color: var(--text-purple); 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            opacity: 0; 
            animation: fadeInPoetic 1.2s forwards 3.2s;
            transition: transform 0.3s;
        }

        @keyframes fadeInPoetic { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- INTRO VIDEO --- */
        #intro-screen { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 1.2s ease-in-out; 
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTENEDOR APP --- */
        #app-container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto; 
            display: none; 
            opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
            padding-bottom: 40px;
        }

        .hero-section { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 20px 0; 
        }

        .header { text-align: center; padding: 10px 0; }
        .logo-img { width: 85px; height: auto; mix-blend-mode: multiply; margin-bottom: 5px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 5px 0; font-weight: 700; }
        
        .cover-img { 
            width: 90%; 
            margin: 15px auto; 
            border-radius: 80px; 
            object-fit: cover; 
            max-height: 38vh; 
            display: block;
            -webkit-mask-image: radial-gradient(circle, black 35%, rgba(0, 0, 0, 0.3) 70%, transparent 80%);
            mask-image: radial-gradient(circle, black 35%, rgba(0, 0, 0, 0.3) 70%, transparent 80%);
        }

        .flat-btn { 
            display: block; 
            width: 85%; 
            margin: 12px auto; 
            padding: 16px 0; 
            background: var(--btn-pink); 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 15px; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1px;
        }

        /* --- SECCIONES --- */
        .collapsible-section { 
            width: 92%; 
            margin: 15px auto; 
            border-radius: 25px; 
            background: var(--card-crema); 
            position: relative; 
            cursor: pointer; 
            overflow: hidden; 
            height: auto; /* Cambiado de min-height: 200px */
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-banner-container { 
            position: relative; 
            width: 100%; 
            z-index: 20; 
            transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .section-banner { width: 100%; height: auto; display: block; border-radius: 25px; }

        .active .section-banner-container { 
            transform: translateY(-101%); 
            position: absolute;
        }

        .content-area { 
            background: var(--card-crema); 
            padding: 40px 0 20px;
            text-align: center;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: 
                max-height 0.7s ease 0.6s,
                opacity 0.4s ease 0.6;
        }

        .active .content-area { 
            padding: 40px 0 20px;
            opacity: 1;
            max-height: 2000px;
            transition:
                max-height 0.7s ease,
                opacity 0.4s ease;
        }

        @keyframes fadeInContent { from { opacity: 0; } to { opacity: 1; } }

        /* REVERTIDO: Botón "Toca" Original */
        .click-hint { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); 
            color: var(--btn-pink); 
            padding: 10px 22px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            border: 1.5px solid var(--btn-pink);
            animation: pulseHint 2.5s infinite; 
            white-space: nowrap;
            z-index: 25;
        }

        @keyframes pulseHint { 
            0%, 100% { transform: translateX(-50%) scale(1); } 
            50% { transform: translateX(-50%) scale(1.05); } 
        }

        .close-x { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 2rem; 
            color: var(--btn-pink); 
            cursor: pointer; 
            z-index: 100;
        }

        /* --- SLIDER AUTORIDADES --- */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; }
        #auth-track { display: flex; transition: transform 0.6s cubic-bezier(0.45, 0, 0.55, 1); }

        .auth-slide { 
            min-width: 100%; 
            height: 380px; 
            overflow-y: auto; 
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none; 
        }
        .auth-slide::-webkit-scrollbar { display: none; }

        .auth-img { 
            width: 180px; 
            height: 240px; 
            object-fit: cover; 
            border-radius: 20px; 
            margin-bottom: 10px;
            flex-shrink: 0;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .auth-info-header {
            position: sticky;
            top: 0;
            background: var(--card-crema);
            width: 100%;
            padding: 10px 0;
            z-index: 10;
        }

        .auth-name { font-weight: 800; text-transform: uppercase; color: var(--text-purple); font-size: 0.95rem; }
        .auth-role { font-size: 0.75rem; color: var(--btn-pink); font-weight: 700; text-transform: uppercase; }

        .auth-description {
            text-align: justify;
            padding: 15px 5px;
            color: #555;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .nav-arrow { 
            position: absolute; 
            top: 40%; 
            transform: translateY(-50%); 
            background: white; 
            border: none; 
            width: 35px; 
            height: 35px; 
            border-radius: 50%; 
            z-index: 10; 
            color: var(--btn-pink); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            cursor: pointer;
        }
        .nav-arrow.left { left: 5px; }
        .nav-arrow.right { right: 5px; }

        /* --- JEROVIAHA GRID --- */
        .insta-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding: 0 20px; 
            margin-top: 15px;
        }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; }

        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .social-bar img { width: 35px; height: 35px; }

        #lightbox { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 11000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }
    </style>
</head>
<body>
