<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --card-crema: #FDF8F5; }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); margin: 0; display: flex; justify-content: center; }
        
        #app-container { width: 100%; max-width: 450px; min-height: 100vh; padding-bottom: 50px; }

        /* --- 1. INTRO: SOLO BOTÓN AL PRINCIPIO --- */
        #intro-screen { position: fixed; inset: 0; background: var(--bg-pink); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #playBtn { padding: 20px 50px; border-radius: 50px; border: none; background: white; color: var(--text-purple); font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        #video-wrap { display: none; width: 90%; aspect-ratio: 9/16; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* --- 2. HEADER: LOGO SIN CÍRCULO --- */
        .header { text-align: center; padding: 40px 20px; }
        .logo-img { width: 120px; height: auto; background: transparent; border: none; box-shadow: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 10px 0 0 0; }
        .slogan { font-size: 0.9rem; font-style: italic; opacity: 0.8; margin-top: 5px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .social-icons a img { width: 28px; }

        /* --- 3. SECCIONES TIPO HOPP (IMAGENES, NO BOTONES) --- */
        .main-img { width: 90%; margin: 0 auto 20px; display: block; border-radius: 15px; }

        .collapsible-section { width: 90%; margin: 15px auto; border-radius: 15px; overflow: hidden; background: transparent; cursor: pointer; }
        .section-banner { width: 100%; display: block; border-radius: 15px; transition: transform 0.2s; }
        
        .content-area { display: none; background: var(--card-crema); margin-top: -10px; padding: 25px 20px 20px; border-radius: 0 0 15px 15px; animation: fadeIn 0.4s; }
        .active .content-area { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* SLIDER INTERNO */
        .slider { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .auth-img { width: 150px; height: 190px; object-fit: cover; border-radius: 10px; border: 3px solid white; }
        .nav-arrow { background: none; border: none; font-size: 1.5rem; color: var(--text-purple); cursor: pointer; }
        .auth-info { text-align: left; }
        .auth-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; }
        .auth-desc { font-size: 0.85rem; line-height: 1.4; color: #444; margin-top: 8px; }

        /* FILANTROPÍA / JEROVIAHA */
        .btn-help { display: block; width: 100%; padding: 15px 0; background: #F26157; color: white; text-decoration: none; border-radius: 10px; font-weight: 700; margin-bottom: 15px; text-align: center; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }

        /* BOTONES FINALES */
        .flat-btn { display: block; width: 90%; margin: 10px auto; padding: 18px 0; background: #B78A9C; color: white; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="playBtn" onclick="showVideo()">Comenzar 🌸</button>
        <div id="video-wrap">
            <video id="intro-video" muted playsinline></video>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <div class="header">
            <img id="logo" src="" class="logo-img">
            <h1 id="titulo"></h1>
            <p id="slogan" class="slogan"></p>
            <div class="social-icons" id="socials"></div>
        </div>

        <img id="portada-prin" src="" class="main-img">

        <a id="link-postulate" href="" class="flat-btn">Postulate!</a>
        <a id="link-insta" href="" class="flat-btn">Instagram</a>

        <div class="collapsible-section" onclick="toggleSection(this)">
            <img id="banner-aut" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <div class="slider">
                    <button class="nav-arrow" onclick="navAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="navAuth(1)">&#10095;</button>
                </div>
                <div class="auth-info">
                    <div id="auth-name" class="auth-name"></div>
                    <div id="auth-cargo" style="font-size: 0.7rem; font-weight: 700; color: #B78A9C;"></div>
                    <div id="auth-bio" class="auth-desc"></div>
                </div>
            </div>
        </div>

        <div class="collapsible-section" onclick="toggleSection(this)">
            <img id="banner-jero" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <a id="link-ayuda" href="" target="_blank" class="btn-help">Ayudanos a ayudar</a>
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <img id="jero-logo" src="" style="width:30px; border-radius:50%;">
                    <span id="jero-name" style="font-weight:700; font-size:0.8rem;"></span>
                </div>
                <div class="insta-grid" id="jero-grid"></div>
            </div>
        </div>

        <a id="email-link" href="" style="display:block; text-align:center; font-size:0.8rem; color:var(--text-purple); opacity:0.6; margin-top:20px; text-decoration:none;"></a>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIndex = 0;

        function showVideo() {
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('video-wrap').style.display = 'block';
            const vid = document.getElementById('intro-video');
            vid.muted = false;
            vid.play();
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                document.getElementById('app-container').style.display = 'block';
                setTimeout(() => document.getElementById('intro-screen').style.display = 'none', 600);
            }, 5000);
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // Video e Intro
                document.getElementById('intro-video').src = d.principal.videoIntro.replace('imgur.com/', 'i.imgur.com/') + '.mp4';
                
                // Header
                document.getElementById('logo').src = d.principal.logo;
                document.getElementById('titulo').innerText = d.principal.titulo;
                document.getElementById('slogan').innerText = d.principal.desc;
                
                // Redes
                document.getElementById('socials').innerHTML = `
                    <a href="${d.principal.linkInsta}"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                `;

                // Portada y Botones
                document.getElementById('portada-prin').src = d.principal.fotoPortada;
                document.getElementById('link-postulate').href = d.principal.linkPostulate;
                document.getElementById('link-insta').href = d.principal.linkInsta;
                document.getElementById('email-link').innerText = d.principal.correo;
                document.getElementById('email-link').href = "mailto:" + d.principal.correo;

                // Autoridades
                autoridades = d.listaAutoridades;
                document.getElementById('banner-aut').src = d.portadaAut.img;
                renderAuth();

                // Jeroviaha
                document.getElementById('banner-jero').src = d.jeroviaha.fotoPortada;
                document.getElementById('link-ayuda').href = d.jeroviaha.linkBoton;
                document.getElementById('jero-logo').src = d.jeroviaha.logoPag;
                document.getElementById('jero-name').innerText = d.jeroviaha.nombrePag;
                document.getElementById('jero-grid').innerHTML = d.jeroviaha.fotos.map(f => f ? `<img src="${f}">` : "").join('');

            } catch (e) {
                console.error("Error cargando datos", e);
            }
        }

        function toggleSection(el) {
            el.classList.toggle('active');
        }

        function renderAuth() {
            const a = autoridades[authIndex];
            // Si la celda de foto está vacía, usamos el logo por defecto o una imagen base
            document.getElementById('auth-foto').src = a.foto && a.foto.includes('http') ? a.foto : "https://i.postimg.cc/zvsXp5Ld/foto-de-todas.jpg";
            document.getElementById('auth-name').innerText = a.nombre;
            document.getElementById('auth-cargo').innerText = a.cargo;
            document.getElementById('auth-bio').innerText = a.bio;
        }

        function navAuth(dir) {
            authIndex = (authIndex + dir + autoridades.length) % autoridades.length;
            renderAuth();
        }

        init();
    </script>
</body>
</html>
