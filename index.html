<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --btn-pink: #B78A9C; --card-crema: #FDF8F5; --btn-red: #F26157; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); margin: 0; user-select: none; }
        
        /* --- AJUSTE DE PANTALLA COMPLETA --- */
        .hero-section {
            height: 100vh; /* Ocupa exactamente toda la pantalla */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Empuja los botones al fondo */
            padding-bottom: 20px;
        }

        #app-container { width: 100%; max-width: 450px; margin: 0 auto; display: none; }

        /* INTRO */
        #intro-screen { position: fixed; inset: 0; background: var(--bg-pink); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #comenzar-btn { padding: 18px 40px; border-radius: 50px; border: none; font-family: 'Playfair Display'; font-weight: 700; font-size: 1.2rem; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #video-wrap { position: absolute; inset: 0; display: none; background: #000; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* HEADER */
        .header { text-align: center; padding: 20px 20px 5px; }
        .logo-img { width: 80px; height: auto; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin: 5px 0; }
        .social-bar { display: flex; justify-content: center; gap: 12px; }
        .social-bar img { width: 22px; }

        /* PORTADA DINÁMICA */
        .cover-img { 
            width: 90%; 
            flex-grow: 1; /* Toma el espacio sobrante */
            margin: 10px auto; 
            border-radius: 20px; 
            object-fit: cover;
            max-height: 45vh; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .flat-btn { display: block; width: 88%; margin: 6px auto; padding: 16px 0; background: var(--btn-pink); color: white; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* SECCIONES */
        .collapsible-section { width: 92%; margin: 25px auto; border-radius: 20px; overflow: hidden; cursor: pointer; }
        .section-banner { width: 100%; display: block; }
        .content-area { display: none; background: var(--card-crema); padding: 30px 20px; border-radius: 20px; position: relative; text-align: center; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .active .content-area { display: block; }
        .active .section-banner { display: none; }

        /* SLIDER */
        .slider { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 15px 0; }
        .auth-img { width: 150px; height: 190px; object-fit: cover; border-radius: 15px; border: 4px solid white; background: #fff; }
        .nav-arrow { background: none; border: none; font-size: 2rem; color: var(--text-purple); cursor: pointer; }

        /* FILANTROPIA */
        .btn-help { display: block; padding: 15px; background: var(--btn-red); color: white; text-decoration: none; border-radius: 12px; font-weight: 700; margin: 15px 0; font-size: 0.85rem; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="comenzar-btn" onclick="startVideo()">COMENZAR 🌸</button>
        <div id="video-wrap"><video id="intro-video" playsinline></video></div>
    </div>

    <div id="app-container">
        <div class="hero-section">
            <div class="header">
                <img id="logo" src="" class="logo-img">
                <h1 id="titulo"></h1>
                <div class="social-bar" id="socials"></div>
            </div>

            <img id="portada" src="" class="cover-img">

            <div class="buttons-wrap">
                <a id="link-postulate" href="#" class="flat-btn">Postulate!</a>
                <a id="link-instagram" href="#" class="flat-btn">Instagram</a>
            </div>
        </div>

        <div id="sec-aut" class="collapsible-section" onclick="toggleSec('sec-aut')">
            <img id="banner-aut" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="tit-aut" style="font-family:'Playfair Display'; margin: 0 0 15px;"></h2>
                <div class="slider">
                    <button class="nav-arrow" onclick="moveAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="moveAuth(1)">&#10095;</button>
                </div>
                <div id="auth-nombre" style="font-weight: 800; text-transform: uppercase; font-size: 1rem;"></div>
                <div id="auth-cargo" style="font-size: 0.75rem; color: var(--btn-pink); font-weight: 700; margin-bottom: 10px;"></div>
                <div id="auth-bio" style="font-size: 0.8rem; text-align: left; line-height: 1.5;"></div>
                <p onclick="toggleSec('sec-aut')" style="margin-top:20px; font-size:0.6rem; opacity:0.4; font-weight:700; letter-spacing:1px;">CERRAR X</p>
            </div>
        </div>

        <div id="sec-jero" class="collapsible-section" onclick="toggleSec('sec-jero')">
            <img id="banner-jero" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="j-tit" style="font-family:'Playfair Display'; margin: 0;"></h2>
                <p id="j-desc" style="font-size: 0.8rem; margin: 15px 0; text-align: left;"></p>
                <a id="j-btn" href="#" class="btn-help" target="_blank"></a>
                <div class="insta-grid" id="j-grid"></div>
                <p onclick="toggleSec('sec-jero')" style="margin-top:20px; font-size:0.6rem; opacity:0.4; font-weight:700; letter-spacing:1px;">CERRAR X</p>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img"></div>

    <script>
        const SCRIPT_URL = "TU_NUEVO_URL_AQUI"; // REEMPLAZÁ ESTO
        let autoridades = [];
        let authIdx = 0;

        function fixUrl(url) {
            if(!url) return "";
            let id = url.split('/').pop().split('#')[0].split('.')[0];
            if(url.includes('imgur.com')) return `https://i.imgur.com/${id}.jpg`;
            return url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // Video
                const vid = document.getElementById('intro-video');
                let vidId = d.principal.videoIntro.split('/').pop().split('#')[0];
                vid.src = `https://i.imgur.com/${vidId}.mp4`;

                // Carga de datos
                document.getElementById('logo').src = fixUrl(d.principal.logo);
                document.getElementById('titulo').innerText = d.principal.titulo;
                document.getElementById('portada').src = fixUrl(d.principal.fotoPortada);
                document.getElementById('link-postulate').href = d.principal.linkPostulate;
                document.getElementById('link-instagram').href = d.principal.linkInsta;

                document.getElementById('socials').innerHTML = `
                    <a href="${d.principal.linkInsta}"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                `;

                autoridades = d.listaAutoridades;
                document.getElementById('banner-aut').src = fixUrl(d.portadaAut.img);
                document.getElementById('tit-aut').innerText = d.portadaAut.titulo;
                updateAuth();

                document.getElementById('banner-jero').src = fixUrl(d.jeroviaha.fotoPortada);
                document.getElementById('j-tit').innerText = d.jeroviaha.tituloClick;
                document.getElementById('j-desc').innerText = d.jeroviaha.desc;
                document.getElementById('j-btn').innerText = d.jeroviaha.txtBoton;
                document.getElementById('j-btn').href = d.jeroviaha.linkBoton;
                document.getElementById('j-grid').innerHTML = d.jeroviaha.fotos.map(f => f ? `<img src="${fixUrl(f)}" onclick="openLB('${fixUrl(f)}')">` : "").join('');

            } catch (e) { console.error(e); }
        }

        function startVideo() {
            const btn = document.getElementById('comenzar-btn');
            const wrap = document.getElementById('video-wrap');
            const vid = document.getElementById('intro-video');
            btn.style.display = 'none';
            wrap.style.display = 'block';
            vid.play();
            vid.onended = () => {
                document.getElementById('intro-screen').style.opacity = '0';
                document.getElementById('app-container').style.display = 'block';
                setTimeout(() => document.getElementById('intro-screen').remove(), 600);
            };
            // Fallback por si el video no termina solo
            setTimeout(() => { if(document.getElementById('intro-screen')) vid.onended(); }, 8000);
        }

        function toggleSec(id) { document.getElementById(id).classList.toggle('active'); }

        function updateAuth() {
            if(!autoridades.length) return;
            const a = autoridades[authIdx];
            document.getElementById('auth-foto').src = fixUrl(a.foto) || document.getElementById('logo').src;
            document.getElementById('auth-nombre').innerText = a.nombre;
            document.getElementById('auth-cargo').innerText = a.cargo;
            document.getElementById('auth-bio').innerText = a.bio;
        }

        function moveAuth(dir) {
            authIdx = (authIdx + dir + autoridades.length) % autoridades.length;
            updateAuth();
        }

        function openLB(url) { document.getElementById('lb-img').src = url; document.getElementById('lightbox').style.display = 'flex'; }

        init();
    </script>
</body>
</html>
