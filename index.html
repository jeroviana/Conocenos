<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --btn-pink: #B78A9C; --card-crema: #FDF8F5; --btn-red: #F26157; }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { 
            font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); 
            margin: 0; padding: 0; overflow-x: hidden; user-select: none;
        }

        /* SECCIÓN 1: OCUPA EL 100% DE LA PANTALLA SI O SI */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
            overflow: hidden; /* Evita que se asome lo de abajo */
            position: relative;
        }

        #app-container { width: 100%; max-width: 450px; margin: 0 auto; display: none; }

        /* INTRO Y VIDEO */
        #intro-screen { position: fixed; inset: 0; background: var(--bg-pink); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #comenzar-btn { 
            padding: 18px 45px; border-radius: 50px; border: none; background: white; 
            color: var(--text-purple); font-family: 'Playfair Display', serif; font-size: 1.2rem; 
            font-weight: 700; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        #video-wrap { position: absolute; inset: 0; display: none; background: #000; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* COMPONENTES */
        .header { text-align: center; flex-shrink: 0; }
        .logo-img { width: 85px; height: auto; mix-blend-mode: multiply; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 5px 0; }
        .social-bar { display: flex; justify-content: center; gap: 12px; margin-top: 5px; }
        .social-bar img { width: 22px; height: 22px; }

        .cover-img { 
            width: 90%; 
            margin: 10px auto; 
            border-radius: 20px; 
            object-fit: cover;
            flex-grow: 1; /* Estira la imagen para llenar el espacio medio */
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-height: 48vh;
        }

        .buttons-wrap { flex-shrink: 0; padding-bottom: 10px; }
        .flat-btn { 
            display: block; width: 85%; margin: 8px auto; padding: 15px 0; background: var(--btn-pink); 
            color: white; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 700; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }

        /* SECCIONES COLAPSABLES */
        .collapsible-section { width: 92%; margin: 30px auto; border-radius: 20px; overflow: hidden; cursor: pointer; }
        .section-banner { width: 100%; display: block; }
        .content-area { display: none; background: var(--card-crema); padding: 35px 20px; border-radius: 20px; text-align: center; position: relative; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .active .content-area { display: block; }
        .active .section-banner { display: none; }

        /* SLIDER AUTORIDADES */
        .slider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; }
        .auth-img { width: 150px; height: 200px; object-fit: cover; border-radius: 15px; border: 4px solid white; background: #fff; }
        .nav-arrow { background: none; border: none; font-size: 2rem; color: var(--text-purple); cursor: pointer; }

        /* JEROVIAHA */
        .btn-help { display: block; padding: 16px; background: var(--btn-red); color: white; text-decoration: none; border-radius: 12px; font-weight: 700; margin: 15px 0; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="comenzar-btn" onclick="iniciarVideo()">COMENZAR 🌸</button>
        <div id="video-wrap"><video id="intro-video" playsinline></video></div>
    </div>

    <div id="app-container">
        <div class="hero-section">
            <div class="header">
                <img id="logo" src="" class="logo-img">
                <h1 id="titulo">Cargando...</h1>
                <div class="social-bar" id="socials"></div>
            </div>

            <img id="portada" src="" class="cover-img">

            <div class="buttons-wrap">
                <a id="link-postulate" href="#" class="flat-btn">Postulate!</a>
                <a id="link-instagram" href="#" class="flat-btn">Instagram</a>
            </div>
        </div>

        <div id="sec-aut" class="collapsible-section" onclick="toggleSec('sec-aut')">
            <img id="banner-aut" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="tit-aut" style="font-family:'Playfair Display'; margin: 0 0 15px;"></h2>
                <div class="slider">
                    <button class="nav-arrow" onclick="moveAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="moveAuth(1)">&#10095;</button>
                </div>
                <div id="auth-nombre" style="font-weight: 800; text-transform: uppercase; font-size: 1rem;"></div>
                <div id="auth-cargo" style="font-size: 0.7rem; color: var(--btn-pink); font-weight: 700; margin-bottom: 10px;"></div>
                <div id="auth-bio" style="font-size: 0.8rem; text-align: left; line-height: 1.5; color: #444;"></div>
                <p onclick="toggleSec('sec-aut')" style="margin-top:25px; font-size:0.6rem; opacity:0.3; font-weight:700;">CERRAR X</p>
            </div>
        </div>

        <div id="sec-jero" class="collapsible-section" onclick="toggleSec('sec-jero')">
            <img id="banner-jero" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="j-tit" style="font-family:'Playfair Display'; margin: 0;"></h2>
                <p id="j-desc" style="font-size: 0.8rem; margin: 15px 0; text-align: left; line-height: 1.5; color: #444;"></p>
                <a id="j-btn" href="#" class="btn-help" target="_blank"></a>
                <div class="insta-grid" id="j-grid"></div>
                <p onclick="toggleSec('sec-jero')" style="margin-top:25px; font-size:0.6rem; opacity:0.3; font-weight:700;">CERRAR X</p>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" style="max-width:90%; border-radius:10px;"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIdx = 0;

        function fix(url) {
            if(!url) return "";
            let id = url.split('/').pop().split('#')[0].split('.')[0];
            return url.includes('imgur.com') ? `https://i.imgur.com/${id}.jpg` : url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // Video
                const vid = document.getElementById('intro-video');
                let vidId = d.principal.videoIntro.split('/').pop().split('#')[0];
                vid.src = `https://i.imgur.com/${vidId}.mp4`;

                // Datos
                document.getElementById('logo').src = fix(d.principal.logo);
                document.getElementById('titulo').innerText = d.principal.titulo;
                document.getElementById('portada').src = fix(d.principal.fotoPortada);
                document.getElementById('link-postulate').href = d.principal.linkPostulate;
                document.getElementById('link-instagram').href = d.principal.linkInsta;

                document.getElementById('socials').innerHTML = `
                    <a href="${d.principal.linkInsta}"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                `;

                autoridades = d.listaAutoridades;
                document.getElementById('banner-aut').src = fix(d.portadaAut.img);
                document.getElementById('tit-aut').innerText = d.portadaAut.titulo;
                updateAuth();

                document.getElementById('banner-jero').src = fix(d.jeroviaha.fotoPortada);
                document.getElementById('j-tit').innerText = d.jeroviaha.tituloClick;
                document.getElementById('j-desc').innerText = d.jeroviaha.desc;
                document.getElementById('j-btn').innerText = d.jeroviaha.txtBoton;
                document.getElementById('j-btn').href = d.jeroviaha.linkBoton;
                document.getElementById('j-grid').innerHTML = d.jeroviaha.fotos.map(f => f ? `<img src="${fix(f)}" onclick="openLB('${fix(f)}')">` : "").join('');

            } catch (e) { console.error("Error:", e); }
        }

        function iniciarVideo() {
            const wrap = document.getElementById('video-wrap');
            const vid = document.getElementById('intro-video');
            document.getElementById('comenzar-btn').style.display = 'none';
            wrap.style.display = 'block';
            vid.play();
            vid.onended = () => {
                document.getElementById('intro-screen').style.opacity = '0';
                document.getElementById('app-container').style.display = 'block';
                setTimeout(() => document.getElementById('intro-screen').remove(), 600);
            };
            setTimeout(() => { if(document.getElementById('intro-screen')) vid.onended(); }, 8500);
        }

        function toggleSec(id) { document.getElementById(id).classList.toggle('active'); }

        function updateAuth() {
            if(!autoridades.length) return;
            const a = autoridades[authIdx];
            document.getElementById('auth-foto').src = fix(a.foto) || document.getElementById('logo').src;
            document.getElementById('auth-nombre').innerText = a.nombre;
            document.getElementById('auth-cargo').innerText = a.cargo;
            document.getElementById('auth-bio').innerText = a.bio;
        }

        function moveAuth(dir) { authIdx = (authIdx+dir+autoridades.length)%autoridades.length; updateAuth(); }
        function openLB(url) { document.getElementById('lb-img').src = url; document.getElementById('lightbox').style.display = 'flex'; }

        init();
    </script>
</body>
</html>
