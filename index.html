<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --btn-pink: #B78A9C; --card-crema: #FDF8F5; --btn-red: #F26157; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); margin: 0; padding: 0; overflow-x: hidden; }

        /* BIENVENIDA POÉTICA */
        #welcome-screen { 
            position: fixed; inset: 0; background: var(--bg-pink); z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; text-align: center; transition: opacity 1.2s ease-in-out; 
        }
        .welcome-text h2 { 
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; 
            margin-bottom: 25px; color: var(--text-purple); opacity: 0;
            animation: fadeInPoetic 1.2s forwards 0.5s; 
        }
        .welcome-text p { 
            font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.8; 
            margin-bottom: 20px; color: var(--text-purple); opacity: 0;
        }
        .p1 { animation: fadeInPoetic 1.2s forwards 1.2s; }
        .p2 { animation: fadeInPoetic 1.2s forwards 2.2s; }
        
        #conocenos-btn { 
            margin-top: 20px; padding: 18px 50px; border-radius: 50px; border: none; background: white; 
            color: var(--text-purple); font-family: 'Playfair Display', serif; font-size: 1.1rem; 
            font-weight: 700; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            opacity: 0; animation: fadeInPoetic 1.2s forwards 3.2s;
        }
        @keyframes fadeInPoetic { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* VIDEO */
        #intro-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 1.2s ease-in-out; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* APP CONTAINER */
        #app-container { width: 100%; max-width: 450px; margin: 0 auto; display: none; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .hero-section { min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 0; }
        .header { text-align: center; }
        .logo-img { width: 90px; height: auto; mix-blend-mode: multiply; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin: 10px 0; }
        
        /* PORTADA DIFUMINADA */
        .cover-img { 
            width: 90%; margin: 15px auto; border-radius: 40px; object-fit: cover; 
            flex-grow: 1; max-height: 48vh;
            box-shadow: 0 0 35px 20px var(--bg-pink); 
            display: block;
        }
        
        .flat-btn { display: block; width: 85%; margin: 12px auto; padding: 18px 0; background: var(--btn-pink); color: white; text-align: center; text-decoration: none; border-radius: 15px; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }

        /* SECCIONES COLAPSABLES */
        .collapsible-section { width: 92%; margin: 25px auto; border-radius: 25px; overflow: hidden; background: white; position: relative; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .section-banner-container { position: relative; width: 100%; height: 200px; }
        .section-banner { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* HINT CENTRADO */
        .click-hint { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.9); color: var(--btn-pink); 
            padding: 10px 22px; border-radius: 30px; font-size: 0.7rem; font-weight: 700; 
            text-transform: uppercase; border: 1.5px solid var(--btn-pink);
            animation: pulseHint 2.5s infinite; white-space: nowrap; z-index: 5;
        }
        @keyframes pulseHint { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }

        .content-area { display: none; background: var(--card-crema); padding: 40px 0; text-align: center; position: relative; animation: fadeIn 0.8s ease; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 2rem; color: var(--btn-pink); cursor: pointer; z-index: 10; }
        .active .content-area { display: block; }
        .active .section-banner-container { display: none; }

        /* AUTORIDADES */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; }
        #auth-track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .auth-slide { min-width: 100%; padding: 0 25px; display: flex; flex-direction: column; align-items: center; }
        .auth-img { width: 240px; height: 320px; object-fit: cover; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .nav-arrow { position: absolute; top: 35%; transform: translateY(-50%); background: white; border: none; width: 45px; height: 45px; border-radius: 50%; z-index: 10; color: var(--btn-pink); font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-arrow.left { left: 10px; }
        .nav-arrow.right { right: 10px; }

        /* JEROVIAHA GRID */
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .social-bar img { width: 35px; height: 35px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-text">
            <h2>Bienvenido a la Asamblea Jerovia</h2>
            <p class="p1">Somos una asamblea perteneciente a la Gran Jurisdicción de Paraguay.</p>
            <p class="p2">Fundadas e instaladas con amor el 9 de octubre del 2021.</p>
        </div>
        <button id="conocenos-btn" onclick="manejarEntrada()">Conócenos 🌸</button>
    </div>

    <div id="intro-screen">
        <video id="intro-video" playsinline muted preload="auto"></video>
    </div>

    <div id="app-container">
        <div class="hero-section">
            <div class="header">
                <img id="logo" src="" class="logo-img">
                <h1 id="titulo">Cargando...</h1>
                <div class="social-bar" id="socials"></div>
            </div>
            <img id="portada" src="" class="cover-img">
            <div class="buttons-wrap">
                <a id="link-postulate" href="#" class="flat-btn" target="_blank">Postulate!</a>
                <a id="link-instagram" href="#" class="flat-btn" target="_blank">Instagram</a>
            </div>
        </div>

        <div id="sec-aut" class="collapsible-section" onclick="toggleSec('sec-aut')">
            <div class="section-banner-container">
                <img id="banner-aut" src="" class="section-banner">
                <div class="click-hint">Conoce a nuestras autoridades</div>
            </div>
            <div class="content-area" onclick="event.stopPropagation()">
                <span class="close-x" onclick="toggleSec('sec-aut')">&times;</span>
                <h2 id="tit-aut" style="font-family:'Playfair Display'; margin-bottom: 5px;"></h2>
                <p id="sub-aut" style="font-size: 0.85rem; margin-bottom: 25px; opacity: 0.7;"></p>
                <div class="slider-wrapper">
                    <button class="nav-arrow left" onclick="moveAuth(-1)">&#10094;</button>
                    <div id="auth-track"></div>
                    <button class="nav-arrow right" onclick="moveAuth(1)">&#10095;</button>
                </div>
            </div>
        </div>

        <div id="sec-jero" class="collapsible-section" onclick="toggleSec('sec-jero')">
            <div class="section-banner-container">
                <img id="banner-jero" src="" class="section-banner">
                <div class="click-hint">Conoce nuestras filantropias</div>
            </div>
            <div class="content-area" onclick="event.stopPropagation()">
                <span class="close-x" onclick="toggleSec('sec-jero')">&times;</span>
                <div style="display:flex; align-items:center; margin: 0 25px 20px;">
                    <a id="j-ig-link" href="#" target="_blank" rel="noopener noreferrer" style="display:flex; align-items:center; text-decoration:none; color:inherit;">
                        <img id="j-ig-logo" src="" style="width:45px; height:45px; border-radius:50%; margin-right:12px; border:2.5px solid var(--btn-pink); object-fit:cover;">
                        <span style="font-weight:700; color:var(--text-purple);">jeroviaha_py</span>
                    </a>
                </div>
                <h2 id="j-tit" style="font-family:'Playfair Display'; padding:0 20px; margin: 10px 0;"></h2>
                <p id="j-desc" style="font-size:0.85rem; padding:0 25px; text-align:left; line-height:1.6; color:#555;"></p>
                <div class="insta-grid" id="j-grid"></div>
                <a id="j-btn" href="#" class="flat-btn" style="margin:25px auto; width:85%; background:var(--btn-red);" target="_blank"></a>
            </div>
        </div>
    </div>

    <div id="lightbox" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:11000; display:none; align-items:center; justify-content:center;" onclick="this.style.display='none'">
        <img id="lb-img" style="max-width:90%; border-radius:15px;">
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIdx = 0;

        function fix(url) {
            if(!url) return "";
            url = url.trim();
            if(url.includes('postimg.cc')) return `https://i.postimg.cc/${url.split('/').pop()}.jpg`;
            if(url.includes('imgur.com')) {
                const id = url.split('/').pop().split('.')[0];
                return `https://i.imgur.com/${id}.jpg`;
            }
            return url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();
                
                // --- HOJA PRINCIPAL ---
                document.getElementById('logo').src = fix(d.principal.logo);
                document.getElementById('titulo').innerText = d.principal.titulo;
                document.getElementById('portada').src = fix(d.principal.fotoPortada);
                document.getElementById('link-postulate').href = d.principal.linkPostulate;
                document.getElementById('link-instagram').href = d.principal.linkInsta;

                let w = d.principal.iconWapp.toString();
                let wLink = w.startsWith('http') ? w : `https://wa.me/${w.replace(/\D/g,'')}`;
                document.getElementById('socials').innerHTML = `
                    <a href="${d.principal.linkInsta}" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${wLink}" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                    <a href="mailto:${d.principal.correo}"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
                `;

                // --- HOJA AUTORIDADES ---
                autoridades = d.listaAutoridades;
                document.getElementById('banner-aut').src = fix(d.portadaAut.img);
                document.getElementById('tit-aut').innerText = d.portadaAut.titulo;
                document.getElementById('sub-aut').innerText = d.portadaAut.desc;
                renderAuth();

                // --- HOJA JEROVIAHA (NOMBRES SEGÚN TU SCRIPT) ---
                const j = d.jeroviaha;
                document.getElementById('banner-jero').src = fix(j.fotoPortada);
                document.getElementById('j-ig-logo').src = fix(j.IconInst) || fix(d.principal.logo);
                document.getElementById('j-ig-link').href = j.linkIG; // <--- CELDA B15 (linkIG en tu script)
                document.getElementById('j-tit').innerText = j.tituloClick;
                document.getElementById('j-desc').innerText = j.desc;
                document.getElementById('j-btn').innerText = j.txtBoton;
                document.getElementById('j-btn').href = j.linkBoton;
                document.getElementById('j-grid').innerHTML = j.fotos.map(f => f ? `<img src="${fix(f)}" onclick="openLB('${fix(f)}')">` : "").join('');

                // --- VIDEO ---
                const vid = document.getElementById('intro-video');
                let vidId = d.principal.videoIntro.split('/').pop().split('#')[0];
                vid.src = `https://i.imgur.com/${vidId}.mp4`;

            } catch (e) { console.error("Error cargando datos:", e); }
        }

        function manejarEntrada() {
            const v = document.getElementById('intro-video');
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                if (v.readyState >= 3) {
                    document.getElementById('intro-screen').style.display = 'flex';
                    setTimeout(() => { document.getElementById('intro-screen').style.opacity = '1'; }, 50);
                    v.muted = false;
                    v.play().catch(mostrarApp);
                    v.onended = mostrarApp;
                } else { mostrarApp(); }
            }, 1200);
        }

        function mostrarApp() {
            const intro = document.getElementById('intro-screen');
            const app = document.getElementById('app-container');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                app.style.display = 'block';
                setTimeout(() => { app.style.opacity = '1'; }, 50);
            }, 1200);
        }

        function toggleSec(id) { document.getElementById(id).classList.toggle('active'); }

        function renderAuth() {
            document.getElementById('auth-track').innerHTML = autoridades.map(a => `
                <div class="auth-slide">
                    <img src="${fix(a.foto)}" class="auth-img">
                    <div style="font-weight:800; text-transform:uppercase; color:var(--text-purple); font-size:1.1rem;">${a.nombre}</div>
                    <div style="font-size:0.75rem; color:var(--btn-pink); font-weight:700; margin-bottom:12px;">${a.cargo}</div>
                    <p style="font-size:0.85rem; line-height:1.6; color:#555;">${a.bio}</p>
                </div>
            `).join('');
        }

        function moveAuth(dir) {
            authIdx = (authIdx + dir + autoridades.length) % autoridades.length;
            document.getElementById('auth-track').style.transform = `translateX(-${authIdx * 100}%)`;
        }

        function openLB(url) {
            document.getElementById('lb-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
