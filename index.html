<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Asamblea Jerovia N°9</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg-pink:#F4C7CC;
--text-purple:#4A235A;
--btn-pink:#B78A9C;
--btn-pink-light:#E6B0AA;
--card-crema:#FDF8F5;
--btn-red:#F26157;
}

*{
-webkit-tap-highlight-color:transparent;
box-sizing:border-box;
outline:none;
margin:0;
padding:0;
}

body{
font-family:'Montserrat',sans-serif;
background-color:var(--bg-pink);
color:var(--text-purple);
overflow-x:hidden;
line-height:1.5;
}

/* WELCOME */

#welcome-screen{
position:fixed;
inset:0;
background:var(--bg-pink);
z-index:10000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
text-align:center;
transition:opacity 1.2s ease-in-out,visibility 1.2s;
}

.welcome-text h2{
font-family:'Playfair Display',serif;
font-style:italic;
font-size:1.8rem;
margin-bottom:25px;
color:var(--text-purple);
opacity:0;
animation:fadeInPoetic 1.2s forwards .5s;
}

.welcome-text p{
font-family:'Playfair Display',serif;
font-size:1.1rem;
line-height:1.8;
margin-bottom:20px;
color:var(--text-purple);
opacity:0;
}

.p1{animation:fadeInPoetic 1.2s forwards 1.2s;}
.p2{animation:fadeInPoetic 1.2s forwards 2.2s;}

#conocenos-btn{
margin-top:20px;
padding:18px 50px;
border-radius:50px;
border:none;
background:white;
color:var(--text-purple);
font-family:'Playfair Display',serif;
font-size:1.1rem;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.05);
opacity:0;
animation:fadeInPoetic 1.2s forwards 3.2s;
}

@keyframes fadeInPoetic{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

/* INTRO VIDEO */

#intro-screen{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:none;
align-items:center;
justify-content:center;
opacity:0;
transition:opacity 1.2s ease-in-out;
}

#intro-video{
width:100%;
height:100%;
object-fit:cover;
}

/* APP */

#app-container{
width:100%;
max-width:450px;
margin:0 auto;
display:none;
opacity:0;
transition:opacity 1.5s ease-in-out;
padding-bottom:40px;
}

.hero-section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
padding:20px 0;
}

.header{text-align:center;padding:10px 0;}

.logo-img{
width:85px;
mix-blend-mode:multiply;
margin-bottom:5px;
}

h1{
font-family:'Playfair Display',serif;
font-size:1.5rem;
margin:5px 0;
font-weight:700;
}

.cover-img{
width:90%;
margin:15px auto;
border-radius:80px;
object-fit:cover;
max-height:38vh;
display:block;
-webkit-mask-image:radial-gradient(circle,black 35%,rgba(0,0,0,.3)70%,transparent 80%);
mask-image:radial-gradient(circle,black 35%,rgba(0,0,0,.3)70%,transparent 80%);
}

.flat-btn{
display:block;
width:85%;
margin:12px auto;
padding:16px 0;
background:var(--btn-pink);
color:white;
text-align:center;
text-decoration:none;
border-radius:15px;
font-weight:700;
text-transform:uppercase;
font-size:.8rem;
letter-spacing:1px;
}

/* SECCIONES */

.collapsible-section{
width:92%;
margin:15px auto;
border-radius:25px;
background:var(--card-crema);
position:relative;
cursor:pointer;
overflow:hidden;
min-height:200px;
transition:all .6s cubic-bezier(.4,0,.2,1);
}

.section-banner-container{
position:relative;
width:100%;
z-index:20;
transition:transform .7s cubic-bezier(.65,0,.35,1);
}

.section-banner{
width:100%;
display:block;
border-radius:25px;
}

.active .section-banner-container{
transform:translateY(-101%);
position:absolute;
}

.content-area{
background:var(--card-crema);
padding:40px 0 20px;
text-align:center;
opacity:0;
max-height:0;
overflow:hidden;
transition:max-height .7s ease .6s,opacity .4s ease .6s;
}

.active .content-area{
padding:40px 0 20px;
opacity:1;
max-height:2000px;
transition:max-height .7s ease,opacity .4s ease;
}

/* SLIDER */

.slider-wrapper{
position:relative;
width:100%;
overflow:hidden;
}

#auth-track{
display:flex;
transition:transform .6s cubic-bezier(.45,0,.55,1);
}

.auth-slide{
min-width:100%;
height:380px;
overflow-y:auto;
padding:0 25px;
display:flex;
flex-direction:column;
align-items:center;
scrollbar-width:none;
}

.auth-slide::-webkit-scrollbar{display:none;}

.auth-img{
width:180px;
height:240px;
object-fit:cover;
border-radius:20px;
margin-bottom:10px;
box-shadow:0 8px 15px rgba(0,0,0,.1);
}

.auth-name{
font-weight:800;
text-transform:uppercase;
color:var(--text-purple);
font-size:.95rem;
}

.auth-role{
font-size:.75rem;
color:var(--btn-pink);
font-weight:700;
text-transform:uppercase;
}

.auth-description{
text-align:justify;
padding:15px 5px;
color:#555;
font-size:.85rem;
line-height:1.6;
}

/* FLECHAS MEJORADAS */

.nav-arrow{
position:absolute;
top:40%;
transform:translateY(-50%);
background:rgba(255,255,255,.55);
backdrop-filter:blur(4px);
border:none;
width:35px;
height:35px;
border-radius:50%;
z-index:10;
color:var(--btn-pink);
box-shadow:0 4px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.nav-arrow.left{left:5px;}
.nav-arrow.right{right:5px;}

/* INDICADORES */

.dots{
display:flex;
justify-content:center;
gap:6px;
margin-top:10px;
}

.dot{
width:7px;
height:7px;
background:#d6a7b2;
border-radius:50%;
transition:.3s;
}

.dot.active{
background:var(--btn-pink);
transform:scale(1.3);
}

/* GRID */

.insta-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:0 20px;
margin-top:15px;
}

.insta-grid img{
width:100%;
aspect-ratio:1;
object-fit:cover;
border-radius:10px;
}

.social-bar{
display:flex;
justify-content:center;
gap:15px;
margin:10px 0;
}

.social-bar img{
width:35px;
height:35px;
}

#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
z-index:11000;
display:none;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<!-- todo tu HTML original se mantiene exactamente igual -->

<div id="lightbox" onclick="this.style.display='none'">
<img id="lb-img" style="max-width:90%;max-height:80%;border-radius:15px;">
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";

let autoridades=[];
let authIdx=0;

/* swipe */
let startX=0;
let endX=0;

function fix(url){
if(!url)return"";
if(url.includes('imgur.com')){
const id=url.split('/').pop().split('.')[0];
return`https://i.imgur.com/${id}.jpg`;
}
return url;
}

function renderAuth(){

document.getElementById('auth-track').innerHTML=autoridades.map(a=>`
<div class="auth-slide">
<img src="${fix(a.foto)}" class="auth-img">
<div class="auth-name">${a.nombre}</div>
<div class="auth-role">${a.cargo}</div>
<div class="auth-description">${a.bio}</div>
</div>
`).join('');

crearDots();
updateHint();

/* swipe */

const wrapper=document.querySelector(".slider-wrapper");

wrapper.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

wrapper.addEventListener("touchend",e=>{
endX=e.changedTouches[0].clientX;

let diff=startX-endX;

if(Math.abs(diff)>50){

if(diff>0)moveAuth(1);
else moveAuth(-1);

}

});

}

/* DOTS */

function crearDots(){

const cont=document.createElement("div");
cont.className="dots";
cont.id="dots";

for(let i=0;i<autoridades.length;i++){

let d=document.createElement("div");
d.className="dot";
if(i===0)d.classList.add("active");

cont.appendChild(d);

}

document.querySelector(".slider-wrapper").after(cont);

}

function updateDots(){

const dots=document.querySelectorAll(".dot");

dots.forEach((d,i)=>{

d.classList.toggle("active",i===authIdx);

});

}

function moveAuth(dir){

document.querySelectorAll('.auth-slide').forEach(s=>s.scrollTo({top:0}));

authIdx=(authIdx+dir+autoridades.length)%autoridades.length;

document.getElementById('auth-track').style.transform=`translateX(-${authIdx*100}%)`;

updateDots();
updateHint();

}

function updateHint(){

if(autoridades[authIdx]){

document.getElementById('hint-text').innerText=`Desliza hacia abajo para leer más sobre ${autoridades[authIdx].nombre}`;

}

}

function openLB(url){
document.getElementById('lb-img').src=url;
document.getElementById('lightbox').style.display='flex';
}

init();

</script>

</body>
</html>
