<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --rosa: #f2c7cb; --purpura: #4a235a; --boton: #c094a1; }
        body { font-family: 'Montserrat', sans-serif; background: var(--rosa); color: var(--purpura); margin: 0; text-align: center; }

        /* Pantalla de Intro */
        #intro-screen { position: fixed; inset: 0; background: var(--rosa); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s; }
        #intro-video { width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Contenido Principal */
        .header { padding: 40px 20px; }
        .logo-prin { width: 100px; border-radius: 50%; margin-bottom: 15px; }
        .social-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-bar img { width: 30px; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 20px; scroll-snap-type: x mandatory; }
        .carousel img { min-width: 85%; border-radius: 20px; scroll-snap-align: center; cursor: pointer; border: 4px solid white; }
        .carousel::-webkit-scrollbar { display: none; }

        .btn-list { padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-link { background: var(--boton); color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }

        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fffcf7; width: 90%; max-width: 380px; border-radius: 25px; padding: 25px; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <video id="intro-video" muted playsinline>
            <source id="videoSrc" src="" type="video/mp4">
        </video>
        <button onclick="startIntro()" id="playBtn" style="margin-top:20px; padding:10px 25px; border-radius:20px; border:none; background:white; color:var(--purpura); font-weight:bold; cursor:pointer;">COMENZAR ✨</button>
    </div>

    <div id="main-content">
        <div class="header">
            <img id="logoImg" src="" class="logo-prin">
            <h1 id="titPrin"></h1>
            <p id="descPrin" style="font-style: italic; font-size: 0.9rem;"></p>
            <div class="social-bar" id="socialBar"></div>
        </div>

        <div class="carousel">
            <img id="portadaAut" src="" onclick="openModal('modalAut')">
            <img id="portadaJero" src="" onclick="openModal('modalJero')">
        </div>

        <div class="btn-list">
            <a id="btnPostulate" href="" class="btn-link">Postulate!</a>
            <a id="btnInstagram" href="" class="btn-link">Instagram</a>
            <a id="btnCorreo" href="" style="font-size: 0.7rem; color: var(--purpura); text-decoration: none; margin-top: 10px;"></a>
        </div>
    </div>

    <div id="modalAut" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('modalAut')">&times;</span>
            <small id="tagAut"></small>
            <h2 id="periodoAut" style="font-family: 'Playfair Display';"></h2>
            <div id="authList"></div>
        </div>
    </div>

    <div id="modalJero" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('modalJero')">&times;</span>
            <h2 id="jTit" style="font-family: 'Playfair Display';"></h2>
            <p id="jDesc" style="font-size: 0.8rem; color: #555;"></p>
            <div class="insta-grid" id="jGrid"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";

        async function init() {
            const res = await fetch(SCRIPT_URL);
            const d = await res.json();

            // Configurar Intro
            document.getElementById('videoSrc').src = d.principal.videoIntro;
            document.getElementById('intro-video').load();

            // Datos Principales
            document.getElementById('logoImg').src = d.principal.logo;
            document.getElementById('titPrin').innerText = d.principal.titulo;
            document.getElementById('descPrin').innerText = d.principal.desc;
            document.getElementById('btnPostulate').href = d.principal.linkPostulate;
            document.getElementById('btnInstagram').href = d.principal.linkInsta;
            document.getElementById('btnCorreo').innerText = d.principal.correo;
            document.getElementById('btnCorreo').href = "mailto:" + d.principal.correo;
            
            // Iconos RRSS
            document.getElementById('socialBar').innerHTML = `
                <a href="${d.principal.linkInsta}"><img src="${d.principal.iconInsta}"></a>
                <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
            `;

            // Portadas Carousel
            document.getElementById('portadaAut').src = d.portadaAut.img;
            document.getElementById('portadaJero').src = d.jeroviaha.fotoPortada;

            // Autoridades
            document.getElementById('tagAut').innerText = d.portadaAut.titulo;
            document.getElementById('periodoAut').innerText = d.portadaAut.sub;
            
            // Jeroviaha
            document.getElementById('jTit').innerText = d.jeroviaha.tituloClick;
            document.getElementById('jDesc').innerText = d.jeroviaha.desc;
            document.getElementById('jGrid').innerHTML = d.jeroviaha.fotos.map(f => `<img src="${f}">`).join('');
        }

        function startIntro() {
            const vid = document.getElementById('intro-video');
            document.getElementById('playBtn').style.display = 'none';
            vid.muted = false;
            vid.play();
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-screen').style.display = 'none', 800);
            }, 5000);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        init();
    </script>
</body>
</html>
