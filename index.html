<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* COLORES EXACTOS DE HOPP */
        :root { 
            --bg-pink: #F4C7CC; 
            --text-purple: #4A235A; 
            --btn-pink: #B78A9C; 
            --card-beige: #FDF8F5;
            --btn-red: #F26157;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-pink); 
            color: var(--text-purple); 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* CONTENEDOR TIPO CELULAR */
        #app-container {
            width: 100%;
            max-width: 450px; /* Tamaño máximo de celular */
            min-height: 100vh;
            position: relative;
            background-color: var(--bg-pink);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* PANTALLA DE INTRODUCCIÓN */
        #intro-screen { 
            position: fixed; inset: 0; background-color: var(--bg-pink); 
            z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: opacity 0.8s ease; 
        }
        .video-box {
            width: 90%; max-width: 380px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); background: #eabfc4; aspect-ratio: 9/16;
            display: flex; align-items: center; justify-content: center;
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; display: none; }
        #playBtn {
            margin-top: 35px; padding: 18px 45px; border-radius: 50px; border: none;
            background-color: white; color: var(--text-purple); 
            font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none;
        }

        /* CABECERA (LOGO Y TÍTULO) */
        .header { text-align: center; padding: 40px 20px 20px 20px; }
        .logo { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 0; }
        .slogan { font-size: 0.9rem; margin: 8px 0; font-style: italic; opacity: 0.8; }

        /* ÍCONOS SOCIALES (SVG puros, no se rompen) */
        .social-icons { display: flex; justify-content: center; gap: 25px; margin: 20px 0; }
        .social-icons a { color: var(--text-purple); display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .social-icons svg { width: 28px; height: 28px; fill: currentColor; }

        /* IMAGEN PRINCIPAL (Vertical, ocupa el ancho) */
        .main-cover { width: 90%; margin: 0 auto 25px auto; display: block; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .main-cover img { width: 100%; height: auto; border-radius: 15px; display: block; }

        /* BOTONES ESTILO HOPP */
        .btn-link { 
            display: block; width: 90%; margin: 12px auto; background-color: var(--btn-pink); 
            color: white; padding: 18px 0; border-radius: 12px; text-decoration: none; 
            font-weight: 700; text-transform: uppercase; font-size: 0.9rem; text-align: center;
            letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* TARJETAS DESPLEGABLES (Autoridades y Filantropía) */
        .card-accordion {
            background-color: var(--card-beige); width: 90%; margin: 25px auto; 
            border-radius: 15px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }
        .card-header { padding: 20px; text-align: center; cursor: pointer; position: relative; }
        .card-header h2 { font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .card-header p { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin: 8px 0 0 0; font-weight: 600; }
        
        .card-content { display: none; padding: 0 20px 25px 20px; text-align: center; animation: slideDown 0.4s ease-out; }
        .card-accordion.active .card-content { display: block; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* SLIDER AUTORIDADES */
        .slider-container { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .slider-arrow { background: var(--bg-pink); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; color: var(--text-purple); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .slider-img { width: 160px; height: 200px; object-fit: cover; border-radius: 10px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .auth-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin: 15px 0 5px 0; text-transform: uppercase; }
        .auth-bio { font-size: 0.8rem; line-height: 1.5; color: #555; text-align: left; background: white; padding: 15px; border-radius: 10px; }

        /* GRILLA FILANTROPÍA */
        .btn-red { display: block; background: var(--btn-red); color: white; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: 700; margin-bottom: 20px; }
        .insta-profile { display: flex; align-items: center; gap: 10px; justify-content: flex-start; margin-bottom: 15px; }
        .insta-profile img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd; }
        .insta-profile span { font-weight: 700; font-size: 0.9rem; }
        .grid-3x2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .grid-3x2 img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="video-box">
            <video id="intro-video" muted playsinline></video>
        </div>
        <button id="playBtn" onclick="startIntro()">ENTRAR 🌸</button>
    </div>

    <div id="app-container" style="display: none;">
        
        <div class="header">
            <img id="h-logo" src="" class="logo">
            <h1 id="h-titulo">Cargando...</h1>
            <p id="h-desc" class="slogan"></p>
            
            <div class="social-icons">
                <a id="link-insta" href="#" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                </a>
                <a id="link-wa" href="#" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.88-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
                </a>
                <a id="link-tel" href="#">
                    <svg viewBox="0 0 24 24"><path d="M20 22.621l-3.521-6.795c-.008.004-1.974.97-2.064 1.011-2.24 1.086-6.799-7.82-4.609-8.994l2.083-1.026-3.493-6.817-2.106 1.039c-7.202 3.755 4.233 25.982 11.6 22.615.121-.055 2.102-1.029 2.11-1.033z"/></svg>
                </a>
            </div>
        </div>

        <div class="main-cover">
            <img id="img-portada" src="">
        </div>

        <a id="btn-postulate" href="#" class="btn-link">Postulate!</a>
        <a id="btn-insta" href="#" class="btn-link">Instagram</a>
        <a id="btn-correo" href="#" style="display:block; text-align:center; margin-top:15px; font-size: 0.8rem; color: var(--text-purple); opacity:0.7; text-decoration:none;"></a>

        <div class="card-accordion" id="acc-aut">
            <div class="card-header" onclick="toggleCard('acc-aut')">
                <h2 id="aut-title">Nuestras Autoridades</h2>
                <p id="aut-sub"></p>
            </div>
            <div class="card-content">
                <div class="slider-container">
                    <button class="slider-arrow" onclick="navAuth(-1)">&#10094;</button>
                    <img id="aut-foto" src="" class="slider-img">
                    <button class="slider-arrow" onclick="navAuth(1)">&#10095;</button>
                </div>
                <div class="auth-name" id="aut-nombre"></div>
                <div style="font-size: 0.75rem; color: var(--btn-pink); font-weight:bold; margin-bottom:10px; text-transform:uppercase;" id="aut-cargo"></div>
                <div class="auth-bio" id="aut-bio"></div>
            </div>
        </div>

        <div class="card-accordion" id="acc-fil">
            <div class="card-header" onclick="toggleCard('acc-fil')">
                <h2 id="fil-title"></h2>
                <p id="fil-sub" style="font-size: 0.85rem; font-family: 'Montserrat'; font-weight:normal; margin-top:8px; line-height:1.4;"></p>
            </div>
            <div class="card-content">
                <a id="fil-btn" href="#" class="btn-red" target="_blank">Ayudanos a ayudar</a>
                <div class="insta-profile">
                    <img id="fil-logo" src="">
                    <span id="fil-handle"></span>
                </div>
                <div class="grid-3x2" id="fil-grid"></div>
            </div>
        </div>

    </div>

    <script>
        // PEGAR TU LINK DE APPS SCRIPT AQUÍ:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        
        let autoridades = [];
        let autIndex = 0;

        // Función para arreglar links de Imgur automáticamente
        function fixVideoUrl(url) {
            if (!url) return "";
            if (url.includes('imgur.com') && !url.includes('.mp4') && !url.includes('i.imgur.com')) {
                let id = url.split('/').pop();
                return `https://i.imgur.com/${id}.mp4`;
            }
            return url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // 1. Configurar Video Intro
                const vidSrc = fixVideoUrl(d.principal.videoIntro);
                const vidEl = document.getElementById('intro-video');
                vidEl.src = vidSrc;
                vidEl.oncanplay = () => {
                    vidEl.style.display = 'block';
                    document.getElementById('playBtn').style.display = 'block';
                };
                vidEl.load();

                // 2. Cabecera y Links
                document.getElementById('h-logo').src = d.principal.logo;
                document.getElementById('h-titulo').innerText = d.principal.titulo;
                document.getElementById('h-desc').innerText = d.principal.desc;
                
                // Mapear links sociales reales (usando los datos de tu Excel)
                document.getElementById('link-insta').href = d.principal.iconInsta; // En tu excel pusiste el link acá
                document.getElementById('link-wa').href = d.principal.iconWapp;
                document.getElementById('link-tel').href = "tel:" + d.principal.iconTel.replace(/\D/g,'');
                
                // 3. Portada y Botones
                document.getElementById('img-portada').src = d.principal.fotoPortada;
                document.getElementById('btn-postulate').href = d.principal.linkPostulate;
                document.getElementById('btn-insta').href = d.principal.linkInsta;
                document.getElementById('btn-correo').innerText = d.principal.correo;
                document.getElementById('btn-correo').href = "mailto:" + d.principal.correo;

                // 4. Configurar Autoridades
                autoridades = d.listaAutoridades;
                document.getElementById('aut-title').innerText = d.portadaAut.titulo;
                document.getElementById('aut-sub').innerText = d.portadaAut.sub;
                renderAuth();

                // 5. Configurar Filantropía
                document.getElementById('fil-title').innerText = d.jeroviaha.tituloClick;
                document.getElementById('fil-sub').innerText = d.jeroviaha.desc;
                document.getElementById('fil-btn').innerText = d.jeroviaha.txtBoton;
                document.getElementById('fil-btn').href = d.jeroviaha.linkBoton;
                document.getElementById('fil-logo').src = d.jeroviaha.logoPag;
                document.getElementById('fil-handle').innerText = d.jeroviaha.nombrePag;
                
                // Cargar grilla de fotos
                const gridHtml = d.jeroviaha.fotos.map(f => {
                    if(f && f.trim() !== "") return `<img src="${f}">`;
                    return "";
                }).join('');
                document.getElementById('fil-grid').innerHTML = gridHtml;

            } catch (e) {
                console.error("Error:", e);
                document.getElementById('h-titulo').innerText = "Error de conexión";
                document.getElementById('playBtn').style.display = 'block'; // Mostrar botón por si falla el video
            }
        }

        // --- LÓGICA DE LA INTERFAZ ---

        function startIntro() {
            const vid = document.getElementById('intro-video');
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('app-container').style.display = 'block'; // Preparamos el fondo
            
            vid.muted = false;
            let playPromise = vid.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => console.log("Auto-play prevenido, saltando intro."));
            }

            // A los 5 segundos oculta la intro suavemente
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                }, 800);
            }, 5000);
        }

        function toggleCard(id) {
            const card = document.getElementById(id);
            card.classList.toggle('active');
        }

        function renderAuth() {
            if(autoridades.length === 0) return;
            const a = autoridades[autIndex];
            // Si no tiene foto individual, usa la de portada general
            document.getElementById('aut-foto').src = a.foto && a.foto.includes('http') ? a.foto : document.getElementById('img-portada').src;
            document.getElementById('aut-nombre').innerText = a.nombre;
            document.getElementById('aut-cargo').innerText = a.cargo;
            document.getElementById('aut-bio').innerText = a.bio;
        }

        function navAuth(dir) {
            autIndex = (autIndex + dir + autoridades.length) % autoridades.length;
            renderAuth();
        }

        // Iniciar todo
        init();
    </script>
</body>
</html>
