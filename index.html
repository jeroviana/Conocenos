<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-pink: #F4C7CC; 
            --text-purple: #4A235A; 
            --btn-pink: #B78A9C; 
            --btn-pink-light: #E6B0AA; 
            --card-crema: #FDF8F5; 
            --btn-red: #F26157; 
            --glow-shadow: rgba(244, 199, 204, 0.8);
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box; 
            outline: none; 
            margin: 0; 
            padding: 0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-pink); 
            color: var(--text-purple); 
            overflow-x: hidden; 
            line-height: 1.5;
        }

        /* --- PANTALLA DE BIENVENIDA --- */
        #welcome-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--bg-pink); 
            z-index: 10000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
            text-align: center; 
            transition: opacity 1.2s ease-in-out, visibility 1.2s; 
        }

        .welcome-text h2 { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 1.8rem; 
            margin-bottom: 25px; 
            color: var(--text-purple); 
            opacity: 0;
            animation: fadeInPoetic 1.2s forwards 0.5s; 
        }

        .welcome-text p { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            margin-bottom: 20px; 
            color: var(--text-purple); 
            opacity: 0;
        }

        .p1 { animation: fadeInPoetic 1.2s forwards 1.2s; }
        .p2 { animation: fadeInPoetic 1.2s forwards 2.2s; }
        
        #conocenos-btn { 
            margin-top: 20px; 
            padding: 18px 50px; 
            border-radius: 50px; 
            border: none; 
            background: white; 
            color: var(--text-purple); 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            opacity: 0; 
            animation: fadeInPoetic 1.2s forwards 3.2s;
            transition: transform 0.3s;
        }

        #conocenos-btn:active { transform: scale(0.95); }

        @keyframes fadeInPoetic { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* --- INTRO VIDEO --- */
        #intro-screen { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 9999; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 1.2s ease-in-out; 
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTENEDOR APP --- */
        #app-container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto; 
            display: none; 
            opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
            padding-bottom: 40px;
        }

        .hero-section { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 20px 0; 
        }

        .header { text-align: center; padding: 10px 0; }
        .logo-img { width: 85px; height: auto; mix-blend-mode: multiply; margin-bottom: 5px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 5px 0; font-weight: 700; }
        
        .cover-img { 
            width: 90%; 
            margin: 15px auto; 
            border-radius: 80px; 
            object-fit: cover; 
            flex-grow: 0; 
            max-height: 38vh; 
            display: block;
            -webkit-mask-image: radial-gradient(circle, black 35%, rgba(0, 0, 0, 0.3) 70%, transparent 80%);
            mask-image: radial-gradient(circle, black 35%, rgba(0, 0, 0, 0.3) 70%, transparent 80%);
        }
        
        .buttons-wrap { margin-top: 10px; margin-bottom: 20px; } 

        .flat-btn { 
            display: block; 
            width: 85%; 
            margin: 12px auto; 
            padding: 16px 0; 
            background: var(--btn-pink); 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 15px; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* --- SECCIONES: EFECTO CARTA --- */
        .collapsible-section { 
            width: 92%; 
            margin: 15px auto; 
            border-radius: 25px; 
            overflow: hidden; 
            background: var(--card-crema); 
            position: relative; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
        }

        .section-banner-container { 
            position: relative; 
            width: 100%; 
            z-index: 20; 
            transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        .active .section-banner-container { 
            transform: translateY(-100%); 
            position: absolute;
        }

        .content-area { 
            display: block; 
            background: var(--card-crema); 
            padding: 40px 0 20px; 
            text-align: center; 
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        .active .content-area { opacity: 1; }

        .click-hint { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); 
            color: var(--btn-pink); 
            padding: 10px 22px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            border: 1.5px solid var(--btn-pink);
            animation: pulseHint 2.5s infinite; 
            white-space: nowrap; 
            z-index: 5;
        }

        @keyframes pulseHint { 
            0%, 100% { transform: translateX(-50%) scale(1); } 
            50% { transform: translateX(-50%) scale(1.05); } 
        }

        .close-x { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 2rem; 
            color: var(--btn-pink); 
            cursor: pointer; 
            z-index: 100;
        }

        /* --- AUTORIDADES: SLIDER Y STICKY --- */
        .slider-wrapper { position: relative; width: 100%; overflow: hidden; }
        #auth-track { display: flex; transition: transform 0.6s ease; }

        /* La caja se limita para que no haya espacios vacíos iniciales */
        .auth-slide { 
            min-width: 100%; 
            height: 380px; 
            overflow-y: auto; 
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none;
        }
        .auth-slide::-webkit-scrollbar { width: 2px; }
        .auth-slide::-webkit-scrollbar-track { background: transparent; margin: 20px 0; }
        .auth-slide::-webkit-scrollbar-thumb { background: var(--btn-pink-light); border-radius: 10px; }

        .auth-img { 
            width: 180px; 
            height: 240px; 
            object-fit: cover; 
            border-radius: 20px; 
            margin-bottom: 10px;
            flex-shrink: 0;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* NOMBRE Y CARGO SE QUEDAN PEGADOS ARRIBA */
        .auth-info-header {
            position: sticky;
            top: 0;
            background: var(--card-crema);
            width: 100%;
            padding: 10px 0;
            z-index: 10;
        }

        .auth-name { font-weight: 800; text-transform: uppercase; color: var(--text-purple); font-size: 0.95rem; }
        .auth-role { font-size: 0.75rem; color: var(--btn-pink); font-weight: 700; text-transform: uppercase; }

        .auth-description {
            text-align: justify;
            padding: 15px 5px;
            color: #555;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .nav-arrow { 
            position: absolute; 
            top: 40%; 
            transform: translateY(-50%); 
            background: white; 
            border: none; 
            width: 35px; 
            height: 35px; 
            border-radius: 50%; 
            z-index: 10; 
            color: var(--btn-pink); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .nav-arrow.left { left: 5px; }
        .nav-arrow.right { right: 5px; }

        /* --- JEROVIAHA GRID --- */
        .insta-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding: 0 20px; 
            margin-top: 15px;
        }
        .insta-grid img { 
            width: 100%; 
            aspect-ratio: 1; 
            object-fit: cover; 
            border-radius: 10px; 
            cursor: pointer;
        }

        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .social-bar img { width: 35px; height: 35px; transition: transform 0.2s; }

        #lightbox { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 11000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }
        #lb-img { max-width: 90%; max-height: 80%; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-text">
            <h2>Bienvenido a la Asamblea Jerovia</h2>
            <p class="p1">Somos una asamblea perteneciente a la Gran Jurisdicción de Paraguay.</p>
            <p class="p2">Fundadas e instaladas con amor el 9 de octubre del 2021.</p>
        </div>
        <button id="conocenos-btn" onclick="manejarEntrada()">Conócenos 🌸</button>
    </div>

    <div id="intro-screen">
        <video id="intro-video" playsinline muted preload="auto"></video>
    </div>

    <div id="app-container">
        <div class="hero-section">
            <div class="header">
                <img id="logo" src="" class="logo-img">
                <h1 id="titulo">Cargando...</h1>
                <div class="social-bar" id="socials"></div>
            </div>

            <img id="portada" src="" class="cover-img">

            <div class="buttons-wrap">
                <a id="link-postulate" href="#" class="flat-btn" target="_blank">Postulate!</a>
                <a id="link-instagram" href="#" class="flat-btn" target="_blank">Instagram</a>
            </div>
        </div>

        <div id="sec-aut" class="collapsible-section" onclick="toggleSec('sec-aut')">
            <div class="section-banner-container">
                <img id="banner-aut" src="" class="section-banner">
                <div class="click-hint">Conoce a nuestras autoridades</div>
            </div>
            <div class="content-area" onclick="event.stopPropagation()">
                <span class="close-x" onclick="toggleSec('sec-aut')">&times;</span>
                <h2 id="tit-aut" style="font-family:'Playfair Display'; margin-bottom: 2px; font-size: 1.3rem;"></h2>
                <p id="sub-aut" style="font-size: 0.8rem; margin-bottom: 20px; font-style: italic; color: #777;"></p>
                
                <div class="slider-wrapper">
                    <button class="nav-arrow left" onclick="moveAuth(-1)">&#10094;</button>
                    <div id="auth-track"></div>
                    <button class="nav-arrow right" onclick="moveAuth(1)">&#10095;</button>
                </div>
                <p id="hint-text" style="font-size: 0.65rem; color: var(--btn-pink); font-style: italic; margin-top: 10px;"></p>
            </div>
        </div>

        <div id="sec-jero" class="collapsible-section" onclick="toggleSec('sec-jero')">
            <div class="section-banner-container">
                <img id="banner-jero" src="" class="section-banner">
                <div class="click-hint">Conoce nuestras filantropías</div>
            </div>
            <div class="content-area" onclick="event.stopPropagation()">
                <span class="close-x" onclick="toggleSec('sec-jero')">&times;</span>
                <div style="display:flex; align-items:center; margin: 0 25px 15px; text-align: left;">
                    <a id="j-ig-link" href="#" target="_blank" rel="noopener noreferrer" style="display:flex; align-items:center; text-decoration:none; color:inherit;">
                        <img id="j-ig-logo" src="" style="width:45px; height:45px; border-radius:50%; margin-right:12px; border:2.5px solid var(--btn-pink); object-fit:cover;">
                        <div>
                            <span style="font-weight:700; display:block; font-size: 0.9rem;">jeroviaha_py</span>
                            <span style="font-size:0.7rem; color: var(--btn-pink);">Ver perfil</span>
                        </div>
                    </a>
                </div>
                <h2 id="j-tit" style="font-family:'Playfair Display'; padding:0 20px; margin: 5px 0; text-align: left; font-size: 1.3rem;"></h2>
                <p id="j-desc" style="font-size:0.8rem; padding:0 25px; text-align:justify; line-height:1.6; color:#555; margin-bottom: 15px;"></p>
                <div class="insta-grid" id="j-grid"></div>
                <a id="j-btn" href="#" class="flat-btn" style="margin:25px auto; width:85%; background:var(--btn-red);" target="_blank"></a>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="">
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIdx = 0;

        function fix(url) {
            if(!url) return "";
            url = url.trim();
            if(url.includes('imgur.com')) {
                const id = url.split('/').pop().split('.')[0];
                return `https://i.imgur.com/${id}.jpg`;
            }
            return url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();
                document.getElementById('logo').src = fix(d.principal.logo);
                document.getElementById('titulo').innerText = d.principal.titulo;
                document.getElementById('portada').src = fix(d.principal.fotoPortada);
                document.getElementById('link-postulate').href = d.principal.linkPostulate;
                document.getElementById('link-instagram').href = d.principal.linkInsta;

                let w = d.principal.iconWapp.toString();
                let wLink = w.startsWith('http') ? w : `https://wa.me/${w.replace(/\D/g,'')}`;
                document.getElementById('socials').innerHTML = `
                    <a href="${d.principal.linkInsta}" target="_blank" rel="noopener"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${wLink}" target="_blank" rel="noopener"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                    <a href="mailto:${d.principal.correo}"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
                `;

                autoridades = d.listaAutoridades;
                document.getElementById('banner-aut').src = fix(d.portadaAut.img);
                document.getElementById('tit-aut').innerText = d.portadaAut.titulo;
                document.getElementById('sub-aut').innerText = d.portadaAut.desc;
                renderAuth();

                const j = d.jeroviaha;
                document.getElementById('banner-jero').src = fix(j.fotoPortada);
                document.getElementById('j-ig-logo').src = fix(j.IconInst) || fix(d.principal.logo);
                document.getElementById('j-ig-link').href = j.linkIG;
                document.getElementById('j-tit').innerText = j.tituloClick;
                document.getElementById('j-desc').innerText = j.desc;
                document.getElementById('j-btn').innerText = j.txtBoton;
                document.getElementById('j-btn').href = j.linkBoton;
                document.getElementById('j-grid').innerHTML = j.fotos
                    .map(f => f ? `<img src="${fix(f)}" onclick="openLB('${fix(f)}')">` : "")
                    .join('');

                const vid = document.getElementById('intro-video');
                if(d.principal.videoIntro.includes('imgur.com')) {
                    let vidId = d.principal.videoIntro.split('/').pop().split('#')[0];
                    vid.src = `https://i.imgur.com/${vidId}.mp4`;
                }
            } catch (e) { console.error("Error:", e); }
        }

        function manejarEntrada() {
            const v = document.getElementById('intro-video');
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                if (v.src && v.readyState >= 3) {
                    document.getElementById('intro-screen').style.display = 'flex';
                    setTimeout(() => { document.getElementById('intro-screen').style.opacity = '1'; }, 50);
                    v.muted = false; v.play().catch(mostrarApp); v.onended = mostrarApp;
                } else { mostrarApp(); }
            }, 1200);
        }

        function mostrarApp() {
            const intro = document.getElementById('intro-screen');
            const app = document.getElementById('app-container');
            if (intro.style.display !== 'none') {
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    app.style.display = 'block';
                    setTimeout(() => { app.style.opacity = '1'; }, 50);
                }, 1200);
            } else {
                app.style.display = 'block';
                setTimeout(() => { app.style.opacity = '1'; }, 50);
            }
        }

        function toggleSec(id) { document.getElementById(id).classList.toggle('active'); }

        function renderAuth() {
            document.getElementById('auth-track').innerHTML = autoridades.map(a => `
                <div class="auth-slide">
                    <img src="${fix(a.foto)}" class="auth-img">
                    <div class="auth-info-header">
                        <div class="auth-name">${a.nombre}</div>
                        <div class="auth-role">${a.cargo}</div>
                    </div>
                    <div class="auth-description">
                        <p>${a.bio.replace(/\n/g, '<br>')}</p>
                    </div>
                </div>
            `).join('');
            updateHint();
        }

        function moveAuth(dir) {
            authIdx = (authIdx + dir + autoridades.length) % autoridades.length;
            document.getElementById('auth-track').style.transform = `translateX(-${authIdx * 100}%)`;
            document.querySelectorAll('.auth-slide').forEach(el => el.scrollTop = 0);
            updateHint();
        }

        function updateHint() {
            if(autoridades[authIdx]) {
                document.getElementById('hint-text').innerText = `Desliza hacia abajo para leer más sobre ${autoridades[authIdx].nombre}`;
            }
        }

        function openLB(url) {
            document.getElementById('lb-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
