<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --btn-pink: #B78A9C; --card-crema: #FDF8F5; }

        * { -webkit-tap-highlight-color: transparent; } /* Evita el color celeste al tocar */

        body { 
            font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); 
            margin: 0; display: flex; justify-content: center; overflow-x: hidden;
            user-select: none; /* Evita selección de texto accidental */
        }
        
        #app-container { width: 100%; max-width: 450px; min-height: 100vh; padding-bottom: 50px; display: none; }

        /* INTRO FULLSCREEN SIN BOTÓN */
        #intro-screen { 
            position: fixed; inset: 0; background: var(--bg-pink); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; transition: opacity 0.8s;
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* HEADER Y LOGOS PEQUEÑOS */
        .header { text-align: center; padding: 30px 20px; }
        .logo-img { width: 90px; height: auto; background: transparent; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .social-bar a img { width: 24px; height: 24px; object-fit: contain; } /* TAMAÑO CORREGIDO */

        .cover-carrusel { width: 85%; margin: 0 auto 15px; display: block; border-radius: 12px; }

        .flat-btn { 
            display: block; width: 85%; margin: 10px auto; padding: 15px 0; background: var(--btn-pink); 
            color: white; text-align: center; text-decoration: none; border-radius: 10px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem;
        }

        /* SECCIONES COLAPSABLES */
        .collapsible-section { width: 90%; margin: 20px auto; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .section-banner { width: 100%; display: block; }
        
        .content-area { 
            display: none; background: var(--card-crema); padding: 25px 20px; border-radius: 15px; 
            position: relative; animation: fadeIn 0.4s ease-out; text-align: center;
        }
        .active .content-area { display: block; }
        .active .section-banner { display: none; }

        /* SLIDER AUTORIDADES */
        .slider { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .auth-img { width: 130px; height: 170px; object-fit: cover; border-radius: 10px; border: 3px solid white; }
        .nav-arrow { background: none; border: none; font-size: 1.5rem; color: var(--text-purple); cursor: pointer; }

        /* JEROVIAHA ORDENADO */
        .btn-help { display: block; padding: 15px; background: #F26157; color: white; text-decoration: none; border-radius: 10px; font-weight: 700; margin: 15px 0; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }

        /* LIGHTBOX */
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border: 3px solid white; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <video id="intro-video" playsinline></video>
    </div>

    <div id="app-container">
        <div class="header">
            <img id="logoImg" src="" class="logo-img">
            <h1 id="titPrin" style="font-family:'Playfair Display'; font-size: 1.5rem; margin: 10px 0 0;"></h1>
            <p id="descPrin" style="font-size: 0.8rem; font-style: italic; opacity: 0.7;"></p>
            <div class="social-bar" id="socialBar"></div>
        </div>

        <img id="portadaCarrusel" src="" class="cover-carrusel">

        <a id="btnPostulate" href="" class="flat-btn">Postulate!</a>
        <a id="btnInstagram" href="" class="flat-btn">Instagram</a>

        <div id="accAut" class="collapsible-section" onclick="toggleCard('accAut')">
            <img id="bannerAut" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="titAut" style="font-family:'Playfair Display'; font-size: 1.2rem; margin: 0 0 10px;"></h2>
                <div class="slider">
                    <button class="nav-arrow" onclick="navAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="navAuth(1)">&#10095;</button>
                </div>
                <div id="auth-name" style="font-weight: 700; text-transform: uppercase;"></div>
                <div id="auth-cargo" style="font-size: 0.7rem; color: var(--btn-pink); margin-bottom: 10px;"></div>
                <div id="auth-bio" style="font-size: 0.8rem; text-align: left; line-height: 1.4;"></div>
                <p onclick="toggleCard('accAut')" style="margin-top:20px; font-size:0.7rem; opacity:0.5;">CERRAR X</p>
            </div>
        </div>

        <div id="accJero" class="collapsible-section" onclick="toggleCard('accJero')">
            <img id="bannerJero" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="jTit" style="font-family:'Playfair Display'; font-size: 1.2rem; margin: 0;"></h2>
                <p id="jDesc" style="font-size: 0.8rem; margin: 10px 0; text-align: left;"></p>
                <a id="jBtn" href="" class="btn-help" target="_blank"></a>
                <div class="insta-grid" id="jGrid"></div>
                <p onclick="toggleCard('accJero')" style="margin-top:20px; font-size:0.7rem; opacity:0.5;">CERRAR X</p>
            </div>
        </div>

        <p id="emailLink" style="text-align:center; font-size:0.7rem; opacity:0.6; margin-top:30px;"></p>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lbImg"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIndex = 0;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // VIDEO E INTRO AUTOMÁTICA
                const vid = document.getElementById('intro-video');
                vid.src = d.principal.videoIntro.replace('imgur.com/', 'i.imgur.com/') + '.mp4';
                vid.play();

                setTimeout(() => {
                    document.getElementById('intro-screen').style.opacity = '0';
                    document.getElementById('app-container').style.display = 'block';
                    setTimeout(() => { 
                        document.getElementById('intro-screen').remove(); // ELIMINA EL VIDEO Y EL SONIDO
                    }, 800);
                }, 6000); // 6 segundos de intro

                // DATOS
                document.getElementById('logoImg').src = d.principal.logo;
                document.getElementById('titPrin').innerText = d.principal.titulo || "Asamblea Jerovia N°9";
                document.getElementById('descPrin').innerText = d.principal.desc || "";
                document.getElementById('portadaCarrusel').src = d.principal.fotoPortada;
                document.getElementById('btnPostulate').href = d.principal.linkPostulate;
                document.getElementById('btnInstagram').href = d.principal.linkInsta;
                document.getElementById('emailLink').innerText = d.principal.correo;

                document.getElementById('socialBar').innerHTML = `
                    <a href="${d.principal.linkInsta}"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                `;

                // AUTORIDADES
                autoridades = d.listaAutoridades;
                document.getElementById('bannerAut').src = d.portadaAut.img;
                document.getElementById('titAut').innerText = d.portadaAut.titulo || "Autoridades";
                renderAuth();

                // JEROVIAHA
                document.getElementById('bannerJero').src = d.jeroviaha.fotoPortada;
                document.getElementById('jTit').innerText = d.jeroviaha.tituloClick || "Filantropía";
                document.getElementById('jDesc').innerText = d.jeroviaha.desc;
                document.getElementById('jBtn').innerText = d.jeroviaha.txtBoton;
                document.getElementById('jBtn').href = d.jeroviaha.linkBoton;
                document.getElementById('jGrid').innerHTML = d.jeroviaha.fotos.map(f => f ? `<img src="${f}" onclick="openLB('${f}')">` : "").join('');

            } catch (e) { console.error(e); }
        }

        function toggleCard(id) { document.getElementById(id).classList.toggle('active'); }

        function renderAuth() {
            if(!autoridades.length) return;
            const a = autoridades[authIndex];
            document.getElementById('auth-foto').src = a.foto || document.getElementById('logoImg').src;
            document.getElementById('auth-name').innerText = a.nombre;
            document.getElementById('auth-cargo').innerText = a.cargo;
            document.getElementById('auth-bio').innerText = a.bio;
        }

        function navAuth(dir) {
            authIndex = (authIndex + dir + autoridades.length) % autoridades.length;
            renderAuth();
        }

        function openLB(url) {
            document.getElementById('lbImg').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
