<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-pink: #F4C7CC; 
            --text-purple: #4A235A; 
            --btn-pink: #B78A9C; 
            --btn-pink-hover: #D4A5B7;
            --card-crema: #FDF8F5; 
            --btn-red: #F26157;
            --btn-red-hover: #FF7B7B;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-pink); 
            color: var(--text-purple); 
            margin: 0; 
            display: flex; 
            justify-content: center;
            overflow-x: hidden;
        }
        
        #app-container { 
            width: 100%; 
            max-width: 450px; 
            min-height: 100vh; 
            padding-bottom: 50px; 
            display: none; /* Oculto hasta que termina el intro */
        }

        /* --- 1. INTRO: VÍDEO FULLSCREEN --- */
        #intro-screen { 
            position: fixed; 
            inset: 0; 
            background: var(--bg-pink); 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 0.8s;
            overflow: hidden;
        }
        
        #intro-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Oculto hasta que el vídeo carga */
        }
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #playBtn { 
            position: relative;
            z-index: 10000;
            padding: 20px 50px; 
            border-radius: 50px; 
            border: none; 
            background: white; 
            color: var(--text-purple); 
            font-family: 'Playfair Display', serif; 
            font-size: 1.4rem; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.2); 
            transition: transform 0.2s, box-shadow 0.2s;
            display: none; /* Oculto hasta que el vídeo carga */
        }
        #playBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        /* --- 2. HEADER: LOGO TRANSPARENTE --- */
        .header { text-align: center; padding: 40px 20px 20px 20px; }
        .logo-img { width: 110px; height: auto; background: transparent; border: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; margin: 10px 0 0 0; }
        .slogan { font-size: 0.85rem; font-style: italic; opacity: 0.8; margin-top: 5px; }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .social-icons a img { width: 28px; transition: opacity 0.2s; }
        .social-icons a:hover img { opacity: 0.7; }

        /* --- 3. CARRUSEL "A MEDIA" Y BOTONES --- */
        .cover-carrusel { 
            width: 80%; 
            margin: 0 auto 20px; 
            display: block; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .flat-btn { 
            display: block; 
            width: 90%; 
            margin: 10px auto; 
            padding: 18px 0; 
            background: var(--btn-pink); 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: background 0.3s, transform 0.2s;
        }
        .flat-btn:hover {
            background: var(--btn-pink-hover);
            transform: translateY(-2px);
        }

        /* --- 4. SECCIONES TIPO HOPP CORREGIDAS (Inline) --- */
        .collapsible-section { 
            width: 90%; 
            margin: 20px auto; 
            border-radius: 15px; 
            overflow: hidden; 
            background: transparent; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .collapsible-section:hover { transform: scale(1.02); }

        .section-banner { width: 100%; display: block; border-radius: 15px; }
        
        .content-area { 
            display: none; 
            background: var(--card-crema); 
            margin-top: -10px; 
            padding: 25px 20px 20px; 
            border-radius: 0 0 15px 15px; 
            position: relative;
            animation: fadeIn 0.4s ease-out; 
        }
        
        .active .content-area { display: block; }
        .active .section-banner { display: none; } /* Oculta el banner cuando se abre */

        /* Cierre para Autoridades */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: var(--text-purple);
            opacity: 0.5;
            cursor: pointer;
            z-index: 10;
        }
        .close-btn:hover { opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        /* SLIDER INTERNO CORREGIDO */
        .slider { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        .auth-img { width: 140px; height: 180px; object-fit: cover; border-radius: 10px; border: 3px solid white; box-shadow: 0 5px 12px rgba(0,0,0,0.1); }
        .nav-arrow { background: none; border: none; font-size: 1.8rem; color: var(--text-purple); cursor: pointer; padding: 0 5px; transition: opacity 0.2s; }
        .nav-arrow:hover { opacity: 0.5; }
        .auth-info { text-align: left; }
        .auth-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .auth-desc { font-size: 0.8rem; line-height: 1.5; color: #444; margin-top: 8px; font-weight: 400; }

        /* JEROVIAHA */
        .btn-help { 
            display: block; 
            width: 100%; 
            padding: 16px 0; 
            background: var(--btn-red); 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            margin-bottom: 20px; 
            text-align: center; 
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: background 0.3s;
        }
        .btn-help:hover { background: var(--btn-red-hover); }

        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; cursor: pointer; transition: transform 0.2s; }
        .insta-grid img:hover { transform: scale(1.05); }

        /* --- 5. LIGHTBOX PARA FOTOS --- */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000;
            display: none; justify-content: center; align-items: center; padding: 20px;
            animation: fadeIn 0.3s;
        }
        #lightbox-img { max-width: 90%; max-height: 90%; border-radius: 10px; border: 5px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #lightbox-close { position: absolute; top: 20px; right: 25px; color: white; font-size: 2rem; cursor: pointer; }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="intro-video-container">
            <video id="intro-video" muted playsinline loop></video>
        </div>
        <button id="playBtn" onclick="startIntro()">COMENZAR 🌸</button>
    </div>

    <div id="app-container">
        <div class="header">
            <img id="logoImg" src="" class="logo-img">
            <h1 id="titPrin"></h1>
            <p id="descPrin" class="slogan"></p>
            <div class="social-bar" id="socialBar"></div>
        </div>

        <img id="portadaCarrusel" src="" class="cover-carrusel">

        <a id="btnPostulate" href="" class="flat-btn">Postulate!</a>
        <a id="btnInstagram" href="" class="flat-btn">Instagram</a>

        <div id="accAut" class="collapsible-section" onclick="toggleCard('accAut')">
            <img id="bannerAut" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <span class="close-btn" onclick="toggleCard('accAut')">&times;</span>
                <small id="tagAut" style="text-transform:uppercase; letter-spacing:1.5px; font-size:0.65rem; color:#888;"></small>
                <h2 id="periodoAut" style="font-family:'Playfair Display'; margin: 5px 0 15px 0; font-size:1.2rem;"></h2>
                <div class="slider">
                    <button class="nav-arrow" onclick="navAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="navAuth(1)">&#10095;</button>
                </div>
                <div class="auth-info">
                    <div id="auth-name" class="auth-name"></div>
                    <div id="auth-cargo" style="font-size: 0.7rem; font-weight: 700; color: #B78A9C; text-transform:uppercase; margin-bottom:5px;"></div>
                    <div id="auth-bio" class="auth-desc"></div>
                </div>
            </div>
        </div>

        <div id="accJero" class="collapsible-section" onclick="toggleCard('accJero')">
            <img id="bannerJero" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <span class="close-btn" onclick="toggleCard('accJero')">&times;</span>
                <a id="jBtnLink" href="" class="btn-help" target="_blank"></a>
                <p id="jDesc" style="font-size: 0.8rem; color: #555; line-height: 1.5; margin-bottom:15px; text-align:left;"></p>
                <div class="insta-grid" id="jGrid"></div>
            </div>
        </div>

        <a id="emailLink" href="" style="display:block; text-align:center; font-size:0.8rem; color:var(--text-purple); opacity:0.6; margin-top:25px; text-decoration:none;"></a>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIndex = 0;

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // 1. Setup Vídeo Fullscreen
                const vidEl = document.getElementById('intro-video');
                vidEl.src = d.principal.videoIntro.replace('imgur.com/', 'i.imgur.com/') + '.mp4';
                
                // Mostrar intro solo cuando el vídeo esté listo para reproducirse
                vidEl.oncanplaythrough = () => {
                    document.getElementById('intro-video-container').style.display = 'block';
                    document.getElementById('playBtn').style.display = 'block';
                    document.getElementById('intro-video').play(); // Auto-play muted para fondo
                };
                vidEl.load();

                // 2. Cabecera y Redes
                document.getElementById('logoImg').src = d.principal.logo;
                document.getElementById('titPrin').innerText = d.principal.titulo;
                document.getElementById('descPrin').innerText = d.principal.desc;
                document.getElementById('btnPostulate').href = d.principal.linkPostulate;
                document.getElementById('btnInstagram').href = d.principal.linkInsta;
                document.getElementById('emailLink').innerText = d.principal.correo;
                document.getElementById('emailLink').href = "mailto:" + d.principal.correo;
                
                document.getElementById('socialBar').innerHTML = `
                    <a href="${d.principal.linkInsta}"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                `;

                // 3. Portada y Secciones
                document.getElementById('portadaCarrusel').src = d.principal.fotoPortada;
                
                // Autoridades (Título Principal de Nuestras Autoridades)
                document.getElementById('tagAut').innerText = d.principal.cargo; // Cargando celda C Principal
                document.getElementById('periodoAut').innerText = d.portadaAut.titulo; // Celda B2 Autoridades
                document.getElementById('bannerAut').src = d.portadaAut.img; // Banner celda A2 Autoridades
                autoridades = d.listaAutoridades;
                renderAuth();

                // Jeroviaha
                document.getElementById('bannerJero').src = d.jeroviaha.fotoPortada; // Banner celda B1 Jeroviaha
                document.getElementById('jBtnLink').innerText = d.jeroviaha.txtBoton;
                document.getElementById('jBtnLink').href = d.jeroviaha.linkBoton; // Link celda B8 Jeroviaha
                document.getElementById('jDesc').innerText = d.jeroviaha.desc;
                
                // Cargar grilla de Instagram con Lightbox
                const gridHtml = d.jeroviaha.fotos.map(f => f ? `<img src="${f}" onclick="openLightbox('${f}')">` : "").join('');
                document.getElementById('jGrid').innerHTML = gridHtml;

            } catch (e) {
                console.error("Error:", e);
                // Si falla, mostramos el botón directo para entrar
                document.getElementById('playBtn').style.display = 'block';
            }
        }

        // Lógica de la Interfaz

        function startIntro() {
            const vid = document.getElementById('intro-video');
            document.getElementById('playBtn').style.display = 'none';
            document.getElementById('app-container').style.display = 'block'; // Preparamos el fondo
            
            vid.muted = false; // Activamos sonido
            vid.currentTime = 0; // Reiniciamos vídeo
            let playPromise = vid.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Auto-play prevenido, saltando intro.");
                });
            }

            // Ocultar intro suavemente a los 5 segundos
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                }, 800);
            }, 5000);
        }

        function toggleCard(id) {
            document.getElementById(id).classList.toggle('active');
        }

        function renderAuth() {
            if(autoridades.length === 0) return;
            const a = autoridades[authIndex];
            // Si la celda de foto individual está vacía (A Autoridades), usamos el logo por defecto
            document.getElementById('auth-foto').src = a.foto && a.foto.includes('http') ? a.foto : document.getElementById('logoImg').src;
            document.getElementById('auth-name').innerText = a.nombre;
            document.getElementById('auth-cargo').innerText = a.cargo;
            document.getElementById('auth-bio').innerText = a.bio;
        }

        function navAuth(dir) {
            autIndex = (autIndex + dir + autoridades.length) % autoridades.length;
            renderAuth();
        }

        // Lightbox
        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
