<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --btn-pink: #B78A9C; --card-crema: #FDF8F5; --btn-red: #F26157; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); margin: 0; overflow-x: hidden; }
        
        #app-container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; display: none; padding-bottom: 40px; }

        /* INTRO REFORZADA */
        #intro-screen { position: fixed; inset: 0; background: var(--bg-pink); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* HEADER */
        .header { text-align: center; padding: 25px 20px 10px; }
        .logo-img { width: 90px; height: auto; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin: 8px 0; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .social-bar img { width: 22px; height: 22px; }

        /* PORTADA TAMAÑO SOLICITADO */
        .cover-carrusel { 
            width: 92%; 
            height: 45vh; /* Ajuste para ver hasta el 2do botón únicamente */
            margin: 0 auto 15px; 
            display: block; 
            border-radius: 20px; 
            object-fit: cover;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .flat-btn { 
            display: block; width: 85%; margin: 10px auto; padding: 16px 0; background: var(--btn-pink); 
            color: white; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 700; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }

        /* SECCIONES */
        .collapsible-section { width: 92%; margin: 25px auto; border-radius: 20px; overflow: hidden; cursor: pointer; }
        .section-banner { width: 100%; display: block; }
        
        .content-area { 
            display: none; background: var(--card-crema); padding: 30px 20px; 
            border-radius: 0 0 20px 20px; text-align: center;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .active .content-area { display: block; }
        .active .section-banner { display: none; }

        /* AUTORIDADES */
        .slider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; }
        .auth-img { width: 150px; height: 190px; object-fit: cover; border-radius: 15px; border: 4px solid white; background: #fff; }
        .nav-arrow { background: none; border: none; font-size: 2rem; color: var(--text-purple); cursor: pointer; }

        /* JEROVIAHA */
        .btn-help { display: block; padding: 16px; background: var(--btn-red); color: white; text-decoration: none; border-radius: 12px; font-weight: 700; margin: 15px 0; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <video id="intro-video" muted playsinline loop></video>
    </div>

    <div id="app-container">
        <div class="header">
            <img id="logoImg" src="" class="logo-img">
            <h1 id="titPrin"></h1>
            <div class="social-bar" id="socialBar"></div>
        </div>

        <img id="portadaCarrusel" src="" class="cover-carrusel">

        <a id="btnPostulate" href="" class="flat-btn">Postulate!</a>
        <a id="btnInstagram" href="" class="flat-btn">Instagram</a>

        <div id="accAut" class="collapsible-section" onclick="toggleCard('accAut')">
            <img id="bannerAut" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="titAut" style="font-family:'Playfair Display'; margin: 0 0 15px;"></h2>
                <div class="slider">
                    <button class="nav-arrow" onclick="navAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="navAuth(1)">&#10095;</button>
                </div>
                <div id="auth-name" style="font-weight: 800; text-transform: uppercase; font-size: 1rem;"></div>
                <div id="auth-cargo" style="font-size: 0.75rem; color: var(--btn-pink); margin-bottom: 10px; font-weight: 700;"></div>
                <div id="auth-bio" style="font-size: 0.8rem; text-align: left; line-height: 1.5; color: #444;"></div>
                <p onclick="toggleCard('accAut')" style="margin-top:25px; font-size:0.7rem; opacity:0.4; font-weight:700;">CERRAR X</p>
            </div>
        </div>

        <div id="accJero" class="collapsible-section" onclick="toggleCard('accJero')">
            <img id="bannerJero" src="" class="section-banner">
            <div class="content-area" onclick="event.stopPropagation()">
                <h2 id="jTit" style="font-family:'Playfair Display'; margin: 0;"></h2>
                <p id="jDesc" style="font-size: 0.85rem; margin: 15px 0; text-align: left; line-height: 1.5;"></p>
                <a id="jBtn" href="" class="btn-help" target="_blank"></a>
                <div class="insta-grid" id="jGrid"></div>
                <p onclick="toggleCard('accJero')" style="margin-top:25px; font-size:0.7rem; opacity:0.4; font-weight:700;">CERRAR X</p>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lbImg"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6YjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIndex = 0;

        function cleanUrl(url) {
            if(!url) return "";
            let id = url.split('/').pop().split('#')[0].split('.')[0];
            if(url.includes('imgur.com')) return `https://i.imgur.com/${id}.jpg`;
            return url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                // VIDEO: Forzamos MP4 directo de Imgur
                const vid = document.getElementById('intro-video');
                let vidId = d.principal.videoIntro.split('/').pop().split('#')[0];
                vid.src = `https://i.imgur.com/${vidId}.mp4`;
                vid.play();

                // Salto a la app
                setTimeout(() => {
                    document.getElementById('intro-screen').style.opacity = '0';
                    document.getElementById('app-container').style.display = 'block';
                    setTimeout(() => document.getElementById('intro-screen').remove(), 600);
                }, 5000);

                // DATOS
                document.getElementById('logoImg').src = cleanUrl(d.principal.logo);
                document.getElementById('titPrin').innerText = d.principal.titulo;
                document.getElementById('portadaCarrusel').src = cleanUrl(d.principal.fotoPortada);
                document.getElementById('btnPostulate').href = d.principal.linkPostulate;
                document.getElementById('btnInstagram').href = d.principal.linkInsta;

                document.getElementById('socialBar').innerHTML = `
                    <a href="${d.principal.linkInsta}"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="${d.principal.iconWapp}"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                `;

                // AUTORIDADES (Forzamos mapeo manual si fallan nombres de objeto)
                autoridades = d.listaAutoridades || [];
                document.getElementById('bannerAut').src = cleanUrl(d.portadaAut.img);
                document.getElementById('titAut').innerText = d.portadaAut.titulo;
                renderAuth();

                // JEROVIAHA
                document.getElementById('bannerJero').src = cleanUrl(d.jeroviaha.fotoPortada);
                document.getElementById('jTit').innerText = d.jeroviaha.tituloClick;
                document.getElementById('jDesc').innerText = d.jeroviaha.desc;
                document.getElementById('jBtn').innerText = d.jeroviaha.txtBoton;
                document.getElementById('jBtn').href = d.jeroviaha.linkBoton;
                document.getElementById('jGrid').innerHTML = d.jeroviaha.fotos.map(f => f ? `<img src="${cleanUrl(f)}" onclick="openLB('${cleanUrl(f)}')">` : "").join('');

            } catch (e) {
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('intro-screen').remove();
            }
        }

        function toggleCard(id) { document.getElementById(id).classList.toggle('active'); }

        function renderAuth() {
            if(!autoridades.length) return;
            const a = autoridades[authIndex];
            // Fix: Usamos acceso por índice si el nombre de propiedad falla
            let fotoUrl = a.foto || a[0] || ""; 
            document.getElementById('auth-foto').src = cleanUrl(fotoUrl) || document.getElementById('logoImg').src;
            document.getElementById('auth-name').innerText = a.nombre || "Autoridad";
            document.getElementById('auth-cargo').innerText = a.cargo || "";
            document.getElementById('auth-bio').innerText = a.bio || "";
        }

        function navAuth(dir) {
            authIndex = (authIndex + dir + autoridades.length) % autoridades.length;
            renderAuth();
        }

        function openLB(url) {
            document.getElementById('lbImg').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
