<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asamblea Jerovia N°9</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-pink: #F4C7CC; --text-purple: #4A235A; --btn-pink: #B78A9C; --card-crema: #FDF8F5; --btn-red: #F26157; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-pink); color: var(--text-purple); margin: 0; padding: 0; overflow-x: hidden; }

        /* HERO SECTION */
        .hero-section { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 15px 0; overflow: hidden; position: relative; }
        #app-container { width: 100%; max-width: 450px; margin: 0 auto; display: none; }

        /* INTRO Y VIDEO */
        #intro-screen { position: fixed; inset: 0; background: var(--bg-pink); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s; }
        #comenzar-btn { 
            padding: 20px 50px; border-radius: 50px; border: none; background: white; 
            color: var(--text-purple); font-family: 'Playfair Display', serif; font-size: 1.3rem; 
            font-weight: 700; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        #video-wrap { position: absolute; inset: 0; display: none; background: #000; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* SOCIAL BAR */
        .header { text-align: center; }
        .logo-img { width: 80px; height: auto; mix-blend-mode: multiply; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin: 5px 0; }
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
        .social-bar a { display: inline-block; padding: 5px; }
        .social-bar img { width: 32px; height: 32px; }

        .cover-img { width: 92%; margin: 10px auto; border-radius: 25px; object-fit: cover; flex-grow: 1; box-shadow: 0 10px 25px rgba(0,0,0,0.08); max-height: 45vh; }

        .buttons-wrap { flex-shrink: 0; padding-bottom: 20px; }
        .flat-btn { 
            display: block; width: 85%; margin: 10px auto; padding: 16px 0; background: var(--btn-pink); 
            color: white; text-align: center; text-decoration: none; border-radius: 15px; font-weight: 700; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }

        /* SECCIONES Y BOTÓN X */
        .collapsible-section { width: 92%; margin: 25px auto; border-radius: 25px; overflow: hidden; background: white; position: relative; }
        .section-banner { width: 100%; display: block; object-fit: cover; min-height: 160px; }
        .content-area { display: none; background: var(--card-crema); padding: 45px 25px 30px; text-align: center; position: relative; animation: slideUp 0.4s ease; }
        
        .close-x { 
            position: absolute; top: 15px; right: 20px; font-size: 1.8rem; line-height: 1;
            color: var(--btn-pink); font-weight: 300; cursor: pointer; padding: 5px;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .active .content-area { display: block; }
        .active .section-banner { display: none; }

        /* SLIDER */
        .slider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; }
        .auth-img { width: 160px; height: 220px; object-fit: cover; border-radius: 20px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .nav-arrow { background: #f0f0f0; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1rem; cursor: pointer; }

        /* JEROVIAHA */
        .btn-help { display: block; padding: 18px; background: var(--btn-red); color: white; text-decoration: none; border-radius: 15px; font-weight: 700; margin: 20px 0; }
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .insta-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="comenzar-btn" onclick="iniciarVideo()">COMENZAR 🌸</button>
        <div id="video-wrap"><video id="intro-video" playsinline muted></video></div>
    </div>

    <div id="app-container">
        <div class="hero-section">
            <div class="header">
                <img id="logo" src="" class="logo-img">
                <h1 id="titulo">Cargando...</h1>
                <div class="social-bar" id="socials"></div>
            </div>
            <img id="portada" src="" class="cover-img">
            <div class="buttons-wrap">
                <a id="link-postulate" href="#" class="flat-btn">Postulate!</a>
                <a id="link-instagram" href="#" class="flat-btn">Instagram</a>
            </div>
        </div>

        <div id="sec-aut" class="collapsible-section">
            <img id="banner-aut" src="" class="section-banner" onclick="toggleSec('sec-aut')">
            <div class="content-area">
                <span class="close-x" onclick="toggleSec('sec-aut')">&times;</span>
                <h2 id="tit-aut" style="font-family:'Playfair Display'; margin: 0;"></h2>
                <p id="sub-aut" style="font-size: 0.8rem; margin-bottom: 20px; opacity: 0.7;"></p>
                <div class="slider">
                    <button class="nav-arrow" onclick="moveAuth(-1)">&#10094;</button>
                    <img id="auth-foto" src="" class="auth-img">
                    <button class="nav-arrow" onclick="moveAuth(1)">&#10095;</button>
                </div>
                <div id="auth-nombre" style="font-weight: 800; text-transform: uppercase; font-size: 1rem;"></div>
                <div id="auth-cargo" style="font-size: 0.7rem; color: var(--btn-pink); font-weight: 700; margin-bottom: 10px;"></div>
                <div id="auth-bio" style="font-size: 0.85rem; text-align: left; line-height: 1.5; color: #555;"></div>
            </div>
        </div>

        <div id="sec-jero" class="collapsible-section">
            <img id="banner-jero" src="" class="section-banner" onclick="toggleSec('sec-jero')">
            <div class="content-area">
                <span class="close-x" onclick="toggleSec('sec-jero')">&times;</span>
                <h2 id="j-tit" style="font-family:'Playfair Display'; margin: 0;"></h2>
                <p id="j-desc" style="font-size: 0.85rem; margin: 20px 0; text-align: left; line-height: 1.5; color: #555;"></p>
                <a id="j-btn" href="#" class="btn-help" target="_blank"></a>
                <div class="insta-grid" id="j-grid"></div>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" style="max-width:90%; border-radius:10px;"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyoB49Pt_LuqAUZ6NjewotFA4soB_64V0gbDk_MNR-YV6vWrHccfWcUeb8ZcLoovKa/exec";
        let autoridades = [];
        let authIdx = 0;
        let videoListo = false;

        function fix(url) {
            if(!url) return "";
            if(url.includes('imgur.com')) {
                let id = url.split('/').pop().split('#')[0].split('.')[0];
                return `https://i.imgur.com/${id}.jpg`;
            }
            if(url.includes('postimg.cc') || url.includes('postimg.org')) {
                return url.replace('postimg.cc', 'i.postimg.cc').split('?')[0] + '.jpg';
            }
            return url;
        }

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const d = await res.json();

                const vid = document.getElementById('intro-video');
                let vidId = d.principal.videoIntro.split('/').pop().split('#')[0];
                vid.src = `https://i.imgur.com/${vidId}.mp4`;
                
                vid.oncanplaythrough = () => { videoListo = true; };

                document.getElementById('logo').src = fix(d.principal.logo);
                document.getElementById('titulo').innerText = d.principal.titulo;
                document.getElementById('portada').src = fix(d.principal.fotoPortada);
                document.getElementById('link-postulate').href = d.principal.linkPostulate;
                document.getElementById('link-instagram').href = d.principal.linkInsta;

                // Barra social con Correo incluido
                document.getElementById('socials').innerHTML = `
                    <a href="${d.principal.linkInsta}" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174855.png"></a>
                    <a href="https://wa.me/${d.principal.iconWapp}" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png"></a>
                    <a href="tel:${d.principal.iconTel}"><img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png"></a>
                    <a href="mailto:${d.principal.correo}"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"></a>
                `;

                autoridades = d.listaAutoridades;
                document.getElementById('banner-aut').src = fix(d.portadaAut.img);
                document.getElementById('tit-aut').innerText = d.portadaAut.titulo;
                document.getElementById('sub-aut').innerText = d.portadaAut.desc;
                updateAuth();

                document.getElementById('banner-jero').src = fix(d.jeroviaha.fotoPortada);
                document.getElementById('j-tit').innerText = d.jeroviaha.tituloClick;
                document.getElementById('j-desc').innerText = d.jeroviaha.desc;
                document.getElementById('j-btn').innerText = d.jeroviaha.txtBoton;
                document.getElementById('j-btn').href = d.jeroviaha.linkBoton;
                document.getElementById('j-grid').innerHTML = d.jeroviaha.fotos.map(f => f ? `<img src="${fix(f)}" onclick="openLB('${fix(f)}')">` : "").join('');

            } catch (e) { console.error("Error:", e); }
        }

        function iniciarVideo() {
            const btn = document.getElementById('comenzar-btn');
            const wrap = document.getElementById('video-wrap');
            const vid = document.getElementById('intro-video');

            btn.innerText = "CARGANDO...";

            // Si el video ya cargó o si tarda más de 3 segundos, intentamos reproducir
            const playPromise = vid.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    vid.muted = false; // Le quitamos el mute ahora que el usuario interactuó
                    btn.style.display = 'none';
                    wrap.style.display = 'block';
                }).catch(() => {
                    // Si falla el video por cualquier razón, vamos directo a la app
                    finalizarIntro();
                });
            }

            vid.onended = finalizarIntro;
            
            // Seguridad: Si después de 6 segundos seguimos en la intro, saltar.
            setTimeout(() => {
                if(document.getElementById('intro-screen')) finalizarIntro();
            }, 6000);
        }

        function finalizarIntro() {
            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            document.getElementById('app-container').style.display = 'block';
            setTimeout(() => { if(intro) intro.remove(); }, 600);
        }

        function toggleSec(id) { document.getElementById(id).classList.toggle('active'); }

        function updateAuth() {
            if(!autoridades.length) return;
            const a = autoridades[authIdx];
            document.getElementById('auth-foto').src = fix(a.foto) || document.getElementById('logo').src;
            document.getElementById('auth-nombre').innerText = a.nombre;
            document.getElementById('auth-cargo').innerText = a.cargo;
            document.getElementById('auth-bio').innerText = a.bio;
        }

        function moveAuth(dir) { authIdx = (authIdx+dir+autoridades.length)%autoridades.length; updateAuth(); }
        function openLB(url) { document.getElementById('lb-img').src = url; document.getElementById('lightbox').style.display = 'flex'; }

        init();
    </script>
</body>
</html>
